name: workflow-design
description: Approved workflow design — the blueprint for generating workflow.yaml and struct schemas.
format: json

json_schema:
  required_fields:
    - field: workflow_name
      type: string
    - field: description
      type: string
    - field: steps
      type: array
      min_items: 1
    - field: steps[].name
      type: string
    - field: steps[].goal_summary
      type: string
    - field: gate
      type: object
    - field: approved
      type: boolean
