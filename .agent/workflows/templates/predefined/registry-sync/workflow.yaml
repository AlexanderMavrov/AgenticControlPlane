name: registry-sync
version: 1
description: >
  Discover source files that implement behavioral specs but are not tracked
  in _registry.json. Scans the codebase, matches files to specs, presents
  findings for approval, and updates the registry.
  Use after manual edits, new file creation, or when the registry is stale.

params:
  - name: component
    description: >
      Optional: limit scan to a specific component/spec.
      If not provided, scans all specs in _index.json.
    required: false

  - name: search_paths
    description: >
      Optional: comma-separated list of directories to scan (e.g., "src/,lib/").
      If not provided, scans the entire project root.
    required: false

gate:
  structural: true
  semantic: true
  human: false
  max_gate_retries: 5
  max_step_retries: 3

context:
  carry_forward: summary

steps:
  # ──────────────────────────────────────────────
  # Step 1: SCAN
  # Read specs + registry, search the codebase for
  # files that implement specs but aren't registered.
  # ──────────────────────────────────────────────
  - name: scan
    spec_check: false
    goal: >
      Discover source files that implement behavioral specs but are NOT
      tracked in _registry.json.

      1. Read .agent/specs/_index.json to get the full list of active specs.
         If "component" param is set: filter to that spec only.
      2. Read .agent/specs/_registry.json to get current mappings.
      3. For each spec:
         a. Read the spec file (.agent/specs/{domain}/{Component}.md)
         b. Note the component name, domain, and key requirements
         c. Search the codebase for DIRECT implementation files:
            - Search by filename (e.g., EditField.tsx, edit-field.ts, edit_field.py)
            - Search by import/reference (e.g., "import EditField", "class EditField")
            - Search by naming patterns (kebab-case, snake_case, PascalCase variants)
            - If "search_paths" param is set: limit search to those directories
            - EXCLUDE: node_modules/, .agent/, .cursor/, dist/, build/
         d. For each DIRECT file found, trace INDIRECT dependencies:
            - **imports**: modules the file imports that contain spec-relevant logic
              (e.g., validation rules, constants, shared utilities)
            - **imported_by**: modules that import the file and may relay spec behavior
            - **style**: CSS/SCSS files that style the component (class names, selectors)
            - **config**: config/i18n/constants files with values mentioned in the spec
            - **test**: test files that verify spec requirements
            Mark each with a relationship type: "direct", "imports", "imported_by",
            "style", "config", "test"
         e. Compare ALL found files (direct + indirect) against _registry.json
         f. Identify files that are NOT yet in the registry

      4. Also check the REVERSE direction:
         - Are there files in _registry.json that NO LONGER EXIST? (stale entries)
         - Are there files in _registry.json whose content no longer matches the spec?

      5. Produce a scan report with:
         - For each spec: current registered files, newly found files, stale entries
         - Confidence level for each match (high/medium/low)
         - Relationship type for each match (direct/imports/imported_by/style/config/test)
         - Brief reason why each file was matched

      Output: a JSON report with all findings.
    subagent: true
    inputs:
      - path: ".agent/specs/_index.json"
        inject: file
      - path: ".agent/specs/_registry.json"
        inject: file
      - path: ".agent/specs/**/*.md"
        inject: reference
    outputs:
      - path: data/scan-report.json
        struct: scan-report

  # ──────────────────────────────────────────────
  # Step 2: REVIEW
  # Present findings, let user approve/reject each.
  # Human gate — user decides what gets registered.
  # ──────────────────────────────────────────────
  - name: review
    spec_check: false
    goal: >
      Present the scan findings to the user for review and approval.

      1. Read the scan report.
      2. Present findings grouped by spec, in a clear format:

         **EditField** (ui)
         Currently registered:
           • src/components/EditField.tsx (direct)
         ┌ NEW MATCHES:
         │  ✚ src/validation/fieldRules.ts     [HIGH]   imports  — imported by EditField.tsx, contains char limit
         │  ✚ src/styles/EditField.module.css  [HIGH]   style    — CSS for EditField error states
         │  ✚ src/hooks/useEditField.ts        [MEDIUM] imports  — shared validation hook
         │  ✚ src/tests/EditField.test.tsx     [HIGH]   test     — tests spec requirements
         └ STALE ENTRIES:
            ✖ src/old/EditField.legacy.tsx     — file no longer exists

      3. For each new match, briefly explain why it was matched.
      4. Ask the user:
         - Which new matches to ADD to the registry? (default: all HIGH confidence)
         - Which stale entries to REMOVE? (default: all)
         - Any manual additions the user wants to specify?

      5. After user approval, produce the approved changes.

      DO NOT proceed until the user confirms which changes to apply.

      Output: a JSON file with the approved registry changes.
    subagent: true
    inputs:
      - path: data/scan-report.json
        struct: scan-report
    outputs:
      - path: data/approved-changes.json
        struct: approved-changes
    gate:
      human: true

  # ──────────────────────────────────────────────
  # Step 3: REGISTER
  # Apply approved changes to _registry.json.
  # ──────────────────────────────────────────────
  - name: register
    spec_check: false
    goal: >
      Apply the approved registry changes to _registry.json.

      1. Read the approved changes.
      2. Read the current .agent/specs/_registry.json.
      3. For each approved addition:
         - Add an entry to the spec's "implemented_by" array:
           { "file": "<path>", "relationship": "<type>" }
           where relationship is one of: direct, imports, imported_by, style, config, test
         - Update "last_verified" to today's date
         - Set "verified_by" to "registry-sync"
      4. For each approved removal:
         - Remove the entry from "implemented_by" (match by "file" field)
         - If "implemented_by" becomes empty, keep the spec entry but note it
      5. For each manual addition from the user:
         - Add the mapping as specified (default relationship: "direct")
      6. Update "updated_at" timestamp.
      7. Write the updated _registry.json.

      Print a summary to the chat:
      - Specs updated: N
      - Files added to registry: N (list)
      - Stale entries removed: N (list)
      - Total registered mappings: N
    subagent: true
    inputs:
      - path: data/approved-changes.json
        struct: approved-changes
      - path: ".agent/specs/_registry.json"
        inject: file
    outputs:
      - path: ".agent/specs/_registry.json"
