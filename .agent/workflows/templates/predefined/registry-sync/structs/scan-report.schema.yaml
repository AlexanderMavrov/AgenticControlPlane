name: scan-report
description: Results of scanning the codebase for unregistered spec implementations.
format: json

json_schema:
  required_fields:
    - field: scanned_at
      type: string
    - field: specs_scanned
      type: number
    - field: findings
      type: array
    - field: findings[].spec_id
      type: string
    - field: findings[].domain
      type: string
    - field: findings[].registered_files
      type: array
    - field: findings[].new_matches
      type: array
    - field: findings[].stale_entries
      type: array
