name: approved-changes
description: User-approved registry changes to apply.
format: json

json_schema:
  required_fields:
    - field: approved_at
      type: string
    - field: additions
      type: array
    - field: removals
      type: array
    - field: additions[].spec_id
      type: string
    - field: additions[].file_path
      type: string
    - field: additions[].relationship
      type: string
      # One of: direct, imports, imported_by, style, config, test
    - field: removals[].spec_id
      type: string
    - field: removals[].file_path
      type: string
