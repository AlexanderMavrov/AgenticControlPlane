name: scan-result
description: >
  Output of a single SCAN subagent — per-domain compliance check results.
  Contains per-spec, per-requirement compliance status with violation details.
  One file per domain, produced in parallel.
format: json

json_schema:
  required_fields:
    - field: workflow
      type: string
    - field: domain
      type: string
    - field: scanned_at
      type: string
    - field: specs_checked
      type: number
    - field: requirements_checked
      type: number
    - field: counts
      type: object
    - field: counts.compliant
      type: number
    - field: counts.violation
      type: number
    - field: counts.partial
      type: number
    - field: counts.unverifiable
      type: number
    - field: results
      type: array
    - field: results[].spec_id
      type: string
    - field: results[].spec_title
      type: string
    - field: results[].requirements
      type: array
    - field: results[].requirements[].requirement_text
      type: string
    - field: results[].requirements[].severity
      type: string
      enum: [MUST, SHOULD, MAY]
    - field: results[].requirements[].status
      type: string
      enum: [compliant, violation, partial, unverifiable]
    # file, line_number, explanation are required for violations/partials
    # but optional for compliant/unverifiable — semantic gate validates this
    - field: violations_summary
      type: array

file_checks:
  exists: true
  min_size: 100
