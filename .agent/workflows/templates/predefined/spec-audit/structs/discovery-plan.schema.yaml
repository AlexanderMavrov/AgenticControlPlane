name: discovery-plan
description: >
  Output of the DISCOVER step — resolved audit scope including which specs
  to check, which source files to scan, active severity filters, and
  per-domain grouping. Reviewed by user via human gate before scan begins.
format: json

json_schema:
  required_fields:
    - field: workflow
      type: string
    - field: discovered_at
      type: string
    - field: target_scope
      type: string
      description: >
        Scope param value ("astro", "generic", "all", etc.) passed to the
        workflow run. Distinct from the pre-scoping `scope` object which
        describes audit breadth.
    - field: scopes_audited
      type: array
      description: >
        Array of scope ids whose specs are actually loaded for this audit.
        Typically [<target_scope>, "generic"] unless target_scope == "all"
        (then every declared scope) or target_scope == "generic" (then just
        ["generic"]).
    - field: filters
      type: object
    - field: filters.severity_filter
      type: string
      enum: [all, must, must+should]
    - field: severity_levels
      type: array
      min_items: 1
    - field: suggest_fixes
      type: boolean
    - field: include_unregistered
      type: boolean
    - field: summary
      type: object
    - field: summary.total_specs
      type: number
    - field: summary.total_domains
      type: number
    - field: summary.total_files
      type: number
    - field: domains
      type: array
    - field: domains[].name
      type: string
    - field: domains[].status
      type: string
      enum: [pending, completed, skipped]
    - field: domains[].specs
      type: array
    - field: domains[].specs[].spec_id
      type: string
    - field: domains[].specs[].source_scope
      type: string
      description: >
        Which scope this spec came from (astro / ares / generic / ...).
        Lets SCAN step read the spec from the correct scope directory.
    - field: domains[].specs[].title
      type: string
    - field: domains[].specs[].spec_file
      type: string
    - field: domains[].specs[].implementation_files
      type: array
    - field: domains[].specs[].registry_status
      type: string
      enum: [mapped, no_registry_mapping, no_implementation_files]
    - field: domains[].estimated_files
      type: number
    - field: warnings
      type: array

file_checks:
  exists: true
  min_size: 100
