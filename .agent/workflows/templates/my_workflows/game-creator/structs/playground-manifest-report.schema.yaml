name: playground-manifest-report
version: 1
description: >
  Report from Step 7 (create-playground-manifest).
  Confirms playground config directory was created and manifest.json updated.
type: object

required:
  - action
  - status

properties:
  action:
    type: string
    enum: [created, skipped]
    description: "created if playground was in integrations list, skipped otherwise"
  manifest_path:
    type: string
    description: "Absolute path to the new manifest.json"
  manifest_values:
    type: object
    description: "The values written to manifest.json"
    properties:
      id:
        type: integer
      name:
        type: string
      gamePath:
        type: string
      type:
        type: string
      buildType:
        type: string
      version:
        type: string
  decisions:
    type: array
    description: "Non-trivial decisions made during this step"
    items:
      type: object
      required: [question, resolution, resolved_by]
      properties:
        question:
          type: string
          description: "The question or ambiguity that arose"
        options_considered:
          type: array
          items:
            type: string
          description: "Potential solutions that were evaluated"
        resolution:
          type: string
          description: "The chosen solution and reasoning"
        resolved_by:
          type: string
          enum: [agent, user]
          description: "Whether the agent decided autonomously or the user was consulted"
  errors:
    type: array
    items:
      type: string
  status:
    type: string
    enum: [success, skipped, failed]
