name: register-cmake-report
version: 1
description: >
  Report from Step 3 (register-in-root-cmake).
  Confirms that the new game was added to EGT_BUILD_GAME_LIST.
type: object

required:
  - cmake_path
  - snakeName
  - action
  - status

properties:
  cmake_path:
    type: string
    description: "Absolute path to the root CMakeLists.txt that was modified"
  snakeName:
    type: string
    description: "The snake_case game name that was registered"
  action:
    type: string
    enum: [added, already_present, failed]
    description: "What was done: added (new entry), already_present (skipped), failed (error)"
  game_list_before:
    type: string
    description: "EGT_BUILD_GAME_LIST value before modification"
  game_list_after:
    type: string
    description: "EGT_BUILD_GAME_LIST value after modification"
  decisions:
    type: array
    description: "Non-trivial decisions made during this step"
    items:
      type: object
      required: [question, resolution, resolved_by]
      properties:
        question:
          type: string
          description: "The question or ambiguity that arose"
        options_considered:
          type: array
          items:
            type: string
          description: "Potential solutions that were evaluated"
        resolution:
          type: string
          description: "The chosen solution and reasoning"
        resolved_by:
          type: string
          enum: [agent, user]
          description: "Whether the agent decided autonomously or the user was consulted"
  errors:
    type: array
    description: "Any errors encountered"
    items:
      type: string
  status:
    type: string
    enum: [success, skipped, failed]
