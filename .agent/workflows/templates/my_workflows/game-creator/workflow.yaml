name: game-creator
version: 1
description: >
  Clone an Alpha Family VLT game from a prototype.
  Reads a game-creator-config.json (generated by the Config UI wizard)
  and performs all filesystem operations: copy plugin, rename files,
  update source code, configs, resources, integrations, and CMake registration.

params:
  - name: config_path
    description: "Path to game-creator-config.json (generated by the Config UI wizard)"
    required: true

gate:
  structural: true
  semantic: false
  human: false

context:
  carry_forward: summary

steps:

  # ── Step 1: Copy game plugin directory + rename dirs/files ──────────────────
  - name: copy-and-rename-plugin
    goal: >
      Read the config JSON from the path provided in the `config_path` param.
      Extract these values:
        - gamesRoot    = config.paths.gamesRoot
        - prototype    = config.prototype                    (e.g. "burning_hot_coins")
        - snakeName    = config.newGame.snakeName            (e.g. "dragon_fortune")
        - pascalName   = config.newGame.pascalName           (e.g. "DragonFortune")
        - oldPascal    = PascalCase of prototype             (e.g. "BurningHotCoins")

      To derive oldPascal: split prototype by "_", capitalize each word, join.
      Example: "burning_hot_coins" → "BurningHotCoins"

      **Action 1 — Copy the plugin directory:**

      Copy the entire directory tree:
        {gamesRoot}/game/alpha_family/plugins/{prototype}/
      to:
        {gamesRoot}/game/alpha_family/plugins/{snakeName}/

      **Action 2 — Rename directories (generic rule):**

      Recursively walk the copied directory. For every directory whose name
      contains the substring {oldPascal}, rename it by replacing {oldPascal}
      with {pascalName}. Process deepest directories first (bottom-up) to
      avoid path conflicts.

      Also: for every directory whose name contains the substring {prototype}
      (snake_case), rename it by replacing {prototype} with {snakeName}.

      Typical examples (burning_hot_coins → dragon_fortune):
        src/Egt/BurningHotCoinsFsm/       → src/Egt/DragonFortuneFsm/
        src/Egt/BurningHotCoinsInfoView/   → src/Egt/DragonFortuneInfoView/
        src/Egt/BurningHotCoinsMath/       → src/Egt/DragonFortuneMath/
        src/Egt/BurningHotCoinsView/       → src/Egt/DragonFortuneView/
      But other games may have additional or fewer module directories.

      **Action 3 — Rename files (generic rule):**

      Recursively walk the copied directory. For every file whose name
      contains the substring {oldPascal}, rename it by replacing {oldPascal}
      with {pascalName}.

      Also: for every file whose name contains the substring {prototype}
      (snake_case), rename it by replacing {prototype} with {snakeName}.

      Typical examples:
        BurningHotCoinsFsm.cpp      → DragonFortuneFsm.cpp
        BurningHotCoinsFsm.h        → DragonFortuneFsm.h
        BurningHotCoinsView.cpp     → DragonFortuneView.cpp
      But other games may have more or fewer files with the game name.

      **General rule:** Rename any directory or file that contains {oldPascal}
      or {prototype} in its name. Everything else is copied as-is.

      **IMPORTANT:** Do NOT modify file contents in this step. Only copy, rename
      directories, and rename files. Content changes happen in later steps.

      **== Behavioral Rules ==**

      1. ATTEMPT FIRST: Try to complete this step autonomously based on the
         instructions above.

      2. ASK ON AMBIGUITY: If you encounter ambiguities, doubts, unexpected
         file structures, or anything not clearly covered by the instructions —
         STOP and ask the user. Present the situation, explain potential
         solutions with pros/cons, and let the user decide. Do NOT guess.

      3. ONLY SPECIFIED CHANGES: Perform ONLY the operations described above.
         Do NOT add new code, comments, documentation, or logic. Do NOT modify
         existing code logic or behavior. Do NOT "improve" or refactor anything.
         If a file does not match a rename pattern — leave it untouched.

      4. RECORD DECISIONS: For every non-trivial decision (including user
         answers), add an entry to the report's "decisions" array with: what
         question arose, what options were considered, what was chosen, and
         whether the agent or user decided (resolved_by: agent|user).

      After completion, write a JSON report to the output path listing:
        - total files copied
        - directories renamed (list)
        - files renamed (list of {old_name → new_name})
        - any errors encountered

    subagent: true
    spec_check: false
    inputs:
      - path: "{config_path}"
        inject: file
    outputs:
      - path: .agent/workflows/game-creator/data/step1-copy-plugin-report.json
        struct: copy-plugin-report

  # ── Step 2: Rename inside source files ──────────────────────────────────────
  - name: rename-in-source-files
    goal: >
      Read the config JSON from the path provided in the `config_path` param.
      Extract these values:
        - gamesRoot    = config.paths.gamesRoot
        - prototype    = config.prototype                    (e.g. "burning_hot_coins")
        - snakeName    = config.newGame.snakeName            (e.g. "dragon_fortune")
        - pascalName   = config.newGame.pascalName           (e.g. "DragonFortune")
        - oldPascal    = PascalCase of prototype             (e.g. "BurningHotCoins")

      To derive oldPascal: split prototype by "_", capitalize each word, join.

      Work in the NEW plugin directory (already copied and renamed by Step 1):
        {gamesRoot}/game/alpha_family/plugins/{snakeName}/

      **Action 1 — Replace in all source files (.cpp, .h, .data.h):**

      Find every .cpp, .h, and .data.h file in the plugin directory (recursively).
      In each file, perform these text replacements (in order):
        1. {oldPascal} → {pascalName}   (all occurrences)
        2. {prototype}  → {snakeName}   (all occurrences, if any)

      Replacement #1 covers all game-specific patterns, including but not limited to:
        - Include paths:        #include <Egt/{oldPascal}View/...>
        - Local includes:       #include "{oldPascal}Fsm.h"
        - Class names:          class {oldPascal}Fsm : public BaseModule
        - Scope operators:      {oldPascal}View::{oldPascal}View()
        - Data structs:         struct {oldPascal}InfoViewData
        - Forward declarations: class {oldPascal}Math;
        - Member types:         {oldPascal}Math& m_math
        - Log categories:       EgtALogCategoryClass({oldPascal}Fsm, "{oldPascal}Fsm")
        - Log categories:       EgtLogCategory(AutoLogCategory, "{oldPascal}Math.MathRules")
        - ImGui strings:        ImGui::Begin("{oldPascal}View", ...)
        - ImGui state keys:     "{oldPascal}View_open"
        - Any other occurrence of {oldPascal} in any context

      **Action 2 — Replace in CMakeLists.txt files:**

      Find every CMakeLists.txt file in the plugin directory (recursively).
      In each file, perform these text replacements:
        1. {oldPascal} → {pascalName}   (covers add_subdirectory paths, target names, etc.)
        2. {prototype}  → {snakeName}   (covers set(PLUGINS_SUBDIR ...) and any other snake_case refs)

      **IMPORTANT:**
        - The specific set of files and patterns varies by game. Do NOT assume a fixed
          list of files — always scan the actual directory and replace in every file
          that contains {oldPascal} or {prototype}.
        - Do NOT modify any files outside the plugin directory.

      **== Behavioral Rules ==**

      1. ATTEMPT FIRST: Try to complete this step autonomously based on the
         instructions above.

      2. ASK ON AMBIGUITY: If you encounter ambiguities, doubts, unexpected
         file structures, or anything not clearly covered by the instructions —
         STOP and ask the user. Present the situation, explain potential
         solutions with pros/cons, and let the user decide. Do NOT guess.

      3. ONLY SPECIFIED CHANGES: Perform ONLY the text replacements described
         above ({oldPascal}→{pascalName} and {prototype}→{snakeName}).
         Do NOT add new code, comments, documentation, or logic. Do NOT modify
         existing code logic or behavior. Do NOT "improve" or refactor anything.
         If a file does not contain any matching patterns — leave it untouched.

      4. RECORD DECISIONS: For every non-trivial decision (including user
         answers), add an entry to the report's "decisions" array with: what
         question arose, what options were considered, what was chosen, and
         whether the agent or user decided (resolved_by: agent|user).

      After completion, write a JSON report to the output path listing:
        - files_modified: list of files that were changed (relative paths)
        - replacements_count: total number of text replacements made
        - pascal_replacements: count of {oldPascal} → {pascalName} replacements
        - snake_replacements: count of {prototype} → {snakeName} replacements
        - any errors encountered

    subagent: true
    spec_check: false
    inputs:
      - path: "{config_path}"
        inject: file
      - path: .agent/workflows/game-creator/data/step1-copy-plugin-report.json
        inject: file
    outputs:
      - path: .agent/workflows/game-creator/data/step2-rename-in-sources-report.json
        struct: rename-in-sources-report

  # ── Step 3: Register game in root CMakeLists.txt ────────────────────────────
  - name: register-in-root-cmake
    goal: >
      Read the config JSON from the path provided in the `config_path` param.
      Extract these values:
        - gamesRoot    = config.paths.gamesRoot
        - snakeName    = config.newGame.snakeName            (e.g. "dragon_fortune")

      **Action — Add {snakeName} to EGT_BUILD_GAME_LIST:**

      Open {gamesRoot}/CMakeLists.txt and find the line that defines
      EGT_BUILD_GAME_LIST. It looks like:

        set(EGT_BUILD_GAME_LIST
            "game1;game2;game3"
            CACHE STRING "List of games to build..."
        )

      The game names are semicolon-separated inside a quoted string.
      Append ;{snakeName} to the end of the list (before the closing quote).

      Example (before):
        "nordic_rush;burning_hot_coins;rise_of_ra;joker_reels_coins_10"
      Example (after):
        "nordic_rush;burning_hot_coins;rise_of_ra;joker_reels_coins_10;dragon_fortune"

      **Validation:**
        - Before modifying, verify that {snakeName} is NOT already in the list.
          If it is already present, skip the modification and report it.
        - Do NOT change EGT_BUILD_INTEGRATION_LIST or EGT_BUILD_GAME_FAMILY_LIST.
        - Do NOT modify any other part of the file.

      **== Behavioral Rules ==**

      1. ATTEMPT FIRST: Try to complete this step autonomously based on the
         instructions above.

      2. ASK ON AMBIGUITY: If you encounter ambiguities, doubts, unexpected
         file structures, or anything not clearly covered by the instructions —
         STOP and ask the user. Present the situation, explain potential
         solutions with pros/cons, and let the user decide. Do NOT guess.

      3. ONLY SPECIFIED CHANGES: Perform ONLY the single modification described
         above (append to EGT_BUILD_GAME_LIST). Do NOT add new code, comments,
         or logic. Do NOT modify any other part of the CMakeLists.txt file.

      4. RECORD DECISIONS: For every non-trivial decision (including user
         answers), add an entry to the report's "decisions" array with: what
         question arose, what options were considered, what was chosen, and
         whether the agent or user decided (resolved_by: agent|user).

      After completion, write a JSON report to the output path.

    subagent: true
    spec_check: false
    inputs:
      - path: "{config_path}"
        inject: file
    outputs:
      - path: .agent/workflows/game-creator/data/step3-register-cmake-report.json
        struct: register-cmake-report

  # ── Step 4: Configuration JSON files ────────────────────────────────────────
  - name: create-configs
    goal: >
      Read the config JSON from the path provided in the `config_path` param.
      Extract these values:
        - gamesRoot    = config.paths.gamesRoot
        - prototype    = config.prototype                    (e.g. "burning_hot_coins")
        - snakeName    = config.newGame.snakeName            (e.g. "dragon_fortune")
        - pascalName   = config.newGame.pascalName           (e.g. "DragonFortune")
        - oldPascal    = PascalCase of prototype             (e.g. "BurningHotCoins")
        - mathVariantId = config.math.variantId              (e.g. "var_9200")
        - mathRtp       = config.math.rtp                    (e.g. 0.9200)
        - mathDestFile  = config.math.destFile               (e.g. "math/var_9200.json")

      To derive oldPascal: split prototype by "_", capitalize each word, join.

      Also derive the OLD math setup values by reading the prototype's Modules.json:
        {gamesRoot}/configs/{prototype}/modules/{oldPascal}Modules.json
      From that file, read the first entry in modules[].config.setups[]:
        - oldVariantId = setups[0].id                        (e.g. "var_8407")
        - oldRtp       = setups[0].rtp                       (e.g. 0.8407)
        - oldMathFile  = setups[0].mathFile                  (e.g. "math/var_8407.json")

      **Action 1 — Copy the configs directory:**

      Copy the entire directory tree:
        {gamesRoot}/configs/{prototype}/
      to:
        {gamesRoot}/configs/{snakeName}/

      **Action 2 — Rename files (generic rule):**

      Recursively walk the copied directory. Rename every file whose name
      contains {oldPascal} by replacing {oldPascal} with {pascalName}.

      Typical renames:
        {oldPascal}Modules.json       → {pascalName}Modules.json
        {oldPascal}DebugModules.json  → {pascalName}DebugModules.json
      But scan for ALL files matching — other games may have additional files.

      ModuleManager_*.json files are NOT renamed (they have generic names).

      **Action 3 — Global text replacement in all JSON files:**

      In every .json file in the copied directory, perform these replacements:
        1. {oldPascal} → {pascalName}   (covers module names, include refs)
        2. {prototype}  → {snakeName}   (covers resource paths like "./resources/{prototype}/...")

      This covers:
        - include arrays:  "BurningHotCoinsModules.json" → "{pascalName}Modules.json"
        - module names:    "name": "BurningHotCoinsMath" → "name": "{pascalName}Math"
        - initAfter refs:  "BurningHotCoinsView" → "{pascalName}View"
        - resource paths:  "./resources/burning_hot_coins/..." → "./resources/{snakeName}/..."

      **Action 4 — Update math setup values:**

      After the global replacement, update the math setup configuration.
      Find every JSON file in the directory that contains a "setups" array
      with math variant entries. For each such file, in every setup entry
      that matches the OLD values, replace:
        - "id":       oldVariantId  → mathVariantId
        - "rtp":      oldRtp        → mathRtp
        - "mathFile": oldMathFile   → mathDestFile

      Known files that contain math setup (but scan for all):
        - {pascalName}Modules.json (main module config)
        - ModuleManager_Playtech_Server.json (has its own copy of the math config)

      **IMPORTANT:**
        - The specific set of files varies by game. Always scan and process ALL
          files in the directory, do not assume a fixed list.
        - Do NOT modify files outside {gamesRoot}/configs/{snakeName}/.
        - Preserve JSON formatting (indentation, structure).

      **== Behavioral Rules ==**

      1. ATTEMPT FIRST: Try to complete this step autonomously based on the
         instructions above.

      2. ASK ON AMBIGUITY: If you encounter ambiguities, doubts, unexpected
         file structures, or anything not clearly covered by the instructions —
         STOP and ask the user. Present the situation, explain potential
         solutions with pros/cons, and let the user decide. Do NOT guess.

      3. ONLY SPECIFIED CHANGES: Perform ONLY the operations described above
         (copy, rename files, text replacements, math setup updates).
         Do NOT add new code, comments, documentation, or logic. Do NOT modify
         existing JSON structure or add/remove fields. Do NOT "improve" or
         refactor anything. If a file does not contain matching patterns —
         leave it untouched.

      4. RECORD DECISIONS: For every non-trivial decision (including user
         answers), add an entry to the report's "decisions" array with: what
         question arose, what options were considered, what was chosen, and
         whether the agent or user decided (resolved_by: agent|user).

      After completion, write a JSON report to the output path listing:
        - files_copied: total count
        - files_renamed: list of {from → to}
        - files_modified: list of files with content changes
        - math_setups_updated: count of setup entries updated
        - any errors encountered

    subagent: true
    spec_check: false
    inputs:
      - path: "{config_path}"
        inject: file
    outputs:
      - path: .agent/workflows/game-creator/data/step4-configs-report.json
        struct: configs-report

  # ── Step 5: Resources ───────────────────────────────────────────────────────
  - name: create-resources
    goal: >
      Read the config JSON from the path provided in the `config_path` param.
      Extract these values:
        - gamesRoot      = config.paths.gamesRoot
        - prototype      = config.prototype                  (e.g. "burning_hot_coins")
        - snakeName      = config.newGame.snakeName          (e.g. "dragon_fortune")
        - mathSourcePath = config.math.sourcePath            (e.g. "C:/path/to/var_9200.json")
        - mathDestFile   = config.math.destFile              (e.g. "math/var_9200.json")
        - assetsMode     = config.assets.mode                ("reuse" or "new")
        - resourcesDir   = config.assets.resourcesDir        (overlay dir, only if mode="new")

      Also derive the OLD math file path by reading:
        {gamesRoot}/resources/{prototype}/RssRawData.json
      Look for the entry in rawFiles[] whose path starts with "math/" and
      ends with ".json" (excluding DevMathRngPreset.json). This is the old
      math file path (e.g. "math/var_8407.json").

      **Action 1 — Copy the resources directory:**

      Copy the entire directory tree:
        {gamesRoot}/resources/{prototype}/
      to:
        {gamesRoot}/resources/{snakeName}/

      This includes all subdirectories: art/, s/, v/, idata/, math/ and all
      manifest files (AllRssData.json, RssRawData.json, Rss*Data.json etc.)

      **Action 2 — Replace the math file:**

      Delete (or overwrite) the old math file in the copied directory.
      If mathSourcePath is provided and the file exists, copy it to:
        {gamesRoot}/resources/{snakeName}/{mathDestFile}

      If the old math file had a different name (e.g. "math/var_8407.json")
      than mathDestFile (e.g. "math/var_9200.json"), also delete the old file
      so there is no stale math file left.

      **Action 3 — Update RssRawData.json:**

      In {gamesRoot}/resources/{snakeName}/RssRawData.json, find the rawFiles[]
      entry that pointed to the old math file and update its path to {mathDestFile}.

      Example (before → after):
        { "path": "math/var_8407.json" }  →  { "path": "math/var_9200.json" }

      **Action 4 — Global text replacement in all JSON files:**

      Scan ALL .json files in the copied resources directory (recursively).
      In each file, replace every occurrence of:
        1. {prototype} → {snakeName}   (for any game-name references in paths)

      Note: In most games, the resource manifests use relative paths WITHOUT
      the game name (e.g. "art/1920x1080/..." not "resources/burning_hot_coins/art/...").
      So this replacement may find zero matches — that is expected and correct.
      But some games may reference their own name, so always scan to be safe.

      Also replace the old math filename if it differs from the new one:
        - In any JSON file, replace the old math path with the new one
          (e.g. "var_8407" → "var_9200" where it appears as a path reference)

      **Action 5 — Overlay new assets (only if assetsMode == "new"):**

      If assetsMode is "new" AND resourcesDir is provided:
        - Copy all files from resourcesDir into {gamesRoot}/resources/{snakeName}/,
          overwriting any existing files at matching relative paths.
        - This overlays new art, sounds, or other assets on top of the copied
          prototype resources.
        - Do NOT delete files that exist in the copy but not in the overlay.

      If assetsMode is "reuse" — skip this action entirely. The prototype
      resources are used as-is (relative paths work correctly since the whole
      directory was copied).

      **IMPORTANT:**
        - Do NOT modify resources of other games (e.g. do not touch
          {gamesRoot}/resources/{prototype}/ or any other game directory).
        - AllRssData.json uses relative include paths (e.g. "art/1920x1080/...") —
          these do NOT contain the game name and do NOT need modification.
        - Cross-game references like "../burning_hot_coins/..." in OTHER games
          are NOT this step's concern — they reference the prototype and should
          continue doing so.

      **== Behavioral Rules ==**

      1. ATTEMPT FIRST: Try to complete this step autonomously based on the
         instructions above.

      2. ASK ON AMBIGUITY: If you encounter ambiguities, doubts, unexpected
         file structures, or anything not clearly covered by the instructions —
         STOP and ask the user. Present the situation, explain potential
         solutions with pros/cons, and let the user decide. Do NOT guess.

      3. ONLY SPECIFIED CHANGES: Perform ONLY the operations described above
         (copy, math file replacement, RssRawData update, optional overlay).
         Do NOT add new files, comments, or logic. Do NOT modify existing
         resource data structures. Do NOT "improve" or refactor anything.
         If a file does not contain matching patterns — leave it untouched.

      4. RECORD DECISIONS: For every non-trivial decision (including user
         answers), add an entry to the report's "decisions" array with: what
         question arose, what options were considered, what was chosen, and
         whether the agent or user decided (resolved_by: agent|user).

      After completion, write a JSON report to the output path.

    subagent: true
    spec_check: false
    inputs:
      - path: "{config_path}"
        inject: file
    outputs:
      - path: .agent/workflows/game-creator/data/step5-resources-report.json
        struct: resources-report

  # ── Step 6: Integration applications ────────────────────────────────────────
  - name: create-integrations
    goal: >
      Read the config JSON from the path provided in the `config_path` param.
      Extract these values:
        - gamesRoot    = config.paths.gamesRoot
        - prototype    = config.prototype                    (e.g. "burning_hot_coins")
        - snakeName    = config.newGame.snakeName            (e.g. "dragon_fortune")
        - pascalName   = config.newGame.pascalName           (e.g. "DragonFortune")
        - integrations = config.integrations                 (e.g. ["astro", "playground", "inspired"])

      Derive these naming variants:
        - oldPascal = PascalCase of prototype                (e.g. "BurningHotCoins")
        - oldLower  = oldPascal lowercased, no separators    (e.g. "burninghotcoins")
        - oldUpper  = oldPascal uppercased, no separators    (e.g. "BURNINGHOTCOINS")
        - newLower  = pascalName lowercased, no separators   (e.g. "dragonfortune")
        - newUpper  = pascalName uppercased, no separators   (e.g. "DRAGONFORTUNE")

      **For each integration in the integrations list, perform the following:**

      **Action 1 — Locate prototype integration directories:**

      The integration source directories follow these patterns:
        - playground: {gamesRoot}/integration/playground/plugins/src/Egt/
        - astro:      {gamesRoot}/integration/astro/apps/src/Egt/
        - inspired:   {gamesRoot}/integration/inspired/apps/src/Egt/
        - playtech:   {gamesRoot}/integration/playtech/plugins/src/Egt/

      Within each integration's Egt/ directory, find ALL subdirectories whose
      name contains {oldPascal}. For most integrations there is one directory:
        - Playground{oldPascal}/     (e.g. PlaygroundBurningHotCoins/)
        - Astro{oldPascal}/          (e.g. AstroBurningHotCoins/)
        - Inspired{oldPascal}/       (e.g. InspiredBurningHotCoins/)

      Playtech has MULTIPLE directories per game (scan for all):
        - Playtech{oldPascal}Client/
        - Playtech{oldPascal}Server/
        - Playtech{oldPascal}Database/
        - Playtech{oldPascal}Bot/  (if exists)

      If a prototype directory does not exist for a requested integration,
      report it as a warning and skip that integration.

      **Action 2 — Copy and rename directories:**

      For each found prototype directory, copy it to the new name by replacing
      {oldPascal} with {pascalName} in the directory name:
        PlaygroundBurningHotCoins/ → PlaygroundDragonFortune/
        AstroBurningHotCoins/      → AstroDragonFortune/
        PlaytechBurningHotCoinsClient/ → PlaytechDragonFortuneClient/
        etc.

      **Action 3 — Rename files inside copied directories:**

      Recursively walk each copied directory. Rename every file whose name
      contains {oldPascal} by replacing {oldPascal} with {pascalName}.

      Also rename files containing {oldLower} (for Playtech delivery XMLs) or
      {prototype} (snake_case).

      **Action 4 — Replace content in all files:**

      In every file (.cpp, .h, CMakeLists.txt, .xml, etc.) within each copied
      directory, perform these 4 text replacements (in this order):

        1. {oldPascal} → {pascalName}
           Covers: class names, #include paths, library names (EgtBurningHotCoinsFsmStatic),
           directory names in add_subdirectory, EGT_REGISTER_CLASS registrations,
           add_dependencies targets (PlaygroundBurningHotCoins)

        2. {prototype} → {snakeName}
           Covers: game ID strings (AstroGame("burning_hot_coins")),
           PlaygroundGame(*kernel, "burning_hot_coins"),
           egt_add_resources(GAME burning_hot_coins ...),
           XML gameFolder parameter, resource paths

        3. {oldLower} → {newLower}
           Covers: Playtech playtech_game_name ("burninghotcoins"),
           add_dependencies targets for executables (astroburninghotcoins,
           inspiredburninghotcoins)

        4. {oldUpper} → {newUpper}
           Covers: Playground export macro (EGT_PLAYGROUND_BURNINGHOTCOINS_EXPORT)

      **Auto-discovery — no integration-level CMake changes needed:**
      All integration-level CMakeLists.txt files use foreach loops over
      EGT_BUILD_GAME_LIST with egt_pascal_case() to auto-discover game
      directories. Since the game was already added to EGT_BUILD_GAME_LIST
      in Step 3, the build system will find the new directories automatically.

      **IMPORTANT:**
        - Only process integrations listed in config.integrations.
        - The specific files and directory structure varies by integration and
          by game. Always scan the actual directories — do not assume a fixed
          list of files.
        - Do NOT modify the prototype integration directories.
        - Do NOT modify integration-level CMakeLists.txt files.

      **== Behavioral Rules ==**

      1. ATTEMPT FIRST: Try to complete this step autonomously based on the
         instructions above.

      2. ASK ON AMBIGUITY: If you encounter ambiguities, doubts, unexpected
         file structures, or anything not clearly covered by the instructions —
         STOP and ask the user. Present the situation, explain potential
         solutions with pros/cons, and let the user decide. Do NOT guess.

      3. ONLY SPECIFIED CHANGES: Perform ONLY the operations described above
         (copy dirs, rename files, 4-way text replacements). Do NOT add new
         code, comments, documentation, or logic. Do NOT modify existing code
         logic or behavior. Do NOT "improve" or refactor anything. If a file
         does not contain matching patterns — leave it untouched.

      4. RECORD DECISIONS: For every non-trivial decision (including user
         answers), add an entry to the report's "decisions" array with: what
         question arose, what options were considered, what was chosen, and
         whether the agent or user decided (resolved_by: agent|user).

      After completion, write a JSON report to the output path.

    subagent: true
    spec_check: false
    inputs:
      - path: "{config_path}"
        inject: file
    outputs:
      - path: .agent/workflows/game-creator/data/step6-integrations-report.json
        struct: integrations-report

  # ── Step 7: Playground manifest ─────────────────────────────────────────────
  - name: create-playground-manifest
    goal: >
      Read the config JSON from the path provided in the `config_path` param.
      Extract these values:
        - gamesRoot    = config.paths.gamesRoot
        - prototype    = config.prototype                    (e.g. "burning_hot_coins")
        - snakeName    = config.newGame.snakeName            (e.g. "dragon_fortune")
        - pascalName   = config.newGame.pascalName           (e.g. "DragonFortune")
        - integrations = config.integrations

      **Skip this step entirely if "playground" is NOT in the integrations list.**

      **Action 1 — Copy the playground configs directory:**

      Copy:
        {gamesRoot}/integration/playground/configs/{prototype}/
      to:
        {gamesRoot}/integration/playground/configs/{snakeName}/

      **Action 2 — Update manifest.json:**

      In the copied {gamesRoot}/integration/playground/configs/{snakeName}/manifest.json,
      update these fields:
        - "name":     set to {snakeName}           (e.g. "dragon_fortune")
        - "gamePath": set to {pascalName}           (e.g. "DragonFortune")

      Keep all other fields unchanged ("id", "type", "buildType", "version"
      are shared across games and should stay as-is).

      Also: if there are any other files in the copied directory, scan them
      for {prototype} and {oldPascal} occurrences and replace as needed.

      **== Behavioral Rules ==**

      1. ATTEMPT FIRST: Try to complete this step autonomously based on the
         instructions above.

      2. ASK ON AMBIGUITY: If you encounter ambiguities, doubts, unexpected
         file structures, or anything not clearly covered by the instructions —
         STOP and ask the user. Present the situation, explain potential
         solutions with pros/cons, and let the user decide. Do NOT guess.

      3. ONLY SPECIFIED CHANGES: Perform ONLY the operations described above
         (copy dir, update manifest.json fields). Do NOT add new files,
         comments, or logic. Do NOT modify fields not explicitly listed.
         Do NOT "improve" or refactor anything.

      4. RECORD DECISIONS: For every non-trivial decision (including user
         answers), add an entry to the report's "decisions" array with: what
         question arose, what options were considered, what was chosen, and
         whether the agent or user decided (resolved_by: agent|user).

      After completion, write a JSON report to the output path.

    subagent: true
    spec_check: false
    inputs:
      - path: "{config_path}"
        inject: file
    outputs:
      - path: .agent/workflows/game-creator/data/step7-playground-manifest-report.json
        struct: playground-manifest-report

  # ── Step 8: Validate and build ─────────────────────────────────────────────
  - name: validate-and-build
    goal: >
      Read the config JSON from the path provided in the `config_path` param.
      Extract these values:
        - gamesRoot    = config.paths.gamesRoot
        - prototype    = config.prototype                    (e.g. "burning_hot_coins")
        - snakeName    = config.newGame.snakeName            (e.g. "dragon_fortune")
        - pascalName   = config.newGame.pascalName           (e.g. "DragonFortune")
        - integrations = config.integrations                 (e.g. ["astro", "playground"])

      Derive these naming variants:
        - oldPascal = PascalCase of prototype                (e.g. "BurningHotCoins")
        - oldLower  = oldPascal lowercased, no separators    (e.g. "burninghotcoins")
        - oldUpper  = oldPascal uppercased, no separators    (e.g. "BURNINGHOTCOINS")

      This step validates that all previous steps completed correctly and that
      the new game compiles successfully.

      **Phase 1 — Filesystem validation:**

      Verify that the expected directories exist:
        - {gamesRoot}/game/alpha_family/plugins/{snakeName}/
        - {gamesRoot}/configs/{snakeName}/
        - {gamesRoot}/resources/{snakeName}/
        - For each integration in integrations list:
          - playground: {gamesRoot}/integration/playground/plugins/src/Egt/Playground{pascalName}/
          - astro: {gamesRoot}/integration/astro/apps/src/Egt/Astro{pascalName}/
          - inspired: {gamesRoot}/integration/inspired/apps/src/Egt/Inspired{pascalName}/
          - playtech: {gamesRoot}/integration/playtech/plugins/src/Egt/Playtech{pascalName}Client/
                      (and Server/, Database/ — check all that exist)
        - If "playground" in integrations:
          {gamesRoot}/integration/playground/configs/{snakeName}/

      Scan ALL files in the new directories for stale OLD name references.
      Search for these patterns (each is a separate check):
        1. {oldPascal}  — should NOT appear in any file content or filename
        2. {prototype}   — should NOT appear in any file content or filename
        3. {oldLower}    — should NOT appear in integration files
        4. {oldUpper}    — should NOT appear in integration files

      Exceptions (acceptable matches to IGNORE):
        - References in comments that mention the prototype as documentation
          (e.g. "// Cloned from burning_hot_coins" — but this pattern is unlikely
          since no step adds such comments)
        - Binary files or compiled artifacts in build/ directories

      Report any stale references found with file path, pattern, and count.

      **Phase 2 — CMake configure:**

      Run CMake configure from {gamesRoot}:
        cmake --preset=msvc-dbg

      The build directory will be: {gamesRoot}/build/msvc-dbg

      Examine the CMake output for autodetect messages. The new game should
      produce these log lines (check all that apply):

        - "autodetect found directory: game/alpha_family/plugins/{snakeName}"
          — confirms the plugin was discovered

        - For "playground" integration:
          "autodetect found directory: integration/playground/plugins/src/Egt/Playground{pascalName}"

        - For "astro" integration:
          "autodetect found directory: integration/astro/apps/src/Egt/Astro{pascalName}"

        - For "inspired" integration:
          "autodetect found directory: integration/inspired/apps/src/Egt/Inspired{pascalName}"

        - For "playtech" integration:
          "autodetect found directory: integration/playtech/plugins/src/Egt/Playtech{pascalName}Client"
          "autodetect found directory: integration/playtech/plugins/src/Egt/Playtech{pascalName}Server"
          "autodetect found directory: integration/playtech/plugins/src/Egt/Playtech{pascalName}Database"

      If any expected autodetect entries are missing, report them.
      If CMake reports errors, report them and skip the build phase.

      **Phase 3 — Build:**

      If CMake configure succeeded, run the build:
        cmake --build build/msvc-dbg --config Debug

      This uses the Ninja generator. Check the build output for:
        - Compilation errors — report any errors related to the new game targets
        - Link errors — report any missing symbols or unresolved references
        - Warnings — report warnings from files in the new game directories

      The new game should produce these build targets (check cmake output):
        - Plugin library: Egt{pascalName}FsmStatic (and other module libs)
        - For each integration: the integration-specific target
          (e.g. PlaygroundDragonFortune, AstroDragonFortune, etc.)

      **Important notes:**
        - If CMake configure fails, still run Phase 1 (filesystem) and report
          the configure failure. Do NOT attempt the build.
        - If the build fails, report the errors but do NOT attempt to fix them.
          The workflow will present these errors to the user for manual resolution.
        - Run cmake commands from {gamesRoot} as the working directory.
        - The cmake presets use Ninja as the generator on Windows.
        - If cmake or ninja is not available in PATH, report it and skip
          configure/build phases (filesystem validation still runs).

      **== Behavioral Rules ==**

      1. ATTEMPT FIRST: Try to complete this step autonomously based on the
         instructions above.

      2. ASK ON AMBIGUITY: If you encounter ambiguities, doubts, unexpected
         results, or anything not clearly covered by the instructions —
         STOP and ask the user. Present the situation, explain potential
         solutions with pros/cons, and let the user decide. Do NOT guess.

      3. ONLY VALIDATE — DO NOT FIX: This step only validates and reports.
         Do NOT attempt to fix any issues found. Do NOT modify any files.
         Do NOT add comments or documentation. Report problems for the user
         to resolve manually.

      4. RECORD DECISIONS: For every non-trivial decision (including user
         answers), add an entry to the report's "decisions" array with: what
         question arose, what options were considered, what was chosen, and
         whether the agent or user decided (resolved_by: agent|user).

      After completion, write a JSON report to the output path.

    subagent: true
    spec_check: false
    inputs:
      - path: "{config_path}"
        inject: file
      - path: .agent/workflows/game-creator/data/step1-copy-plugin-report.json
        inject: file
      - path: .agent/workflows/game-creator/data/step2-rename-in-sources-report.json
        inject: file
      - path: .agent/workflows/game-creator/data/step3-register-cmake-report.json
        inject: file
      - path: .agent/workflows/game-creator/data/step4-configs-report.json
        inject: file
      - path: .agent/workflows/game-creator/data/step5-resources-report.json
        inject: file
      - path: .agent/workflows/game-creator/data/step6-integrations-report.json
        inject: file
      - path: .agent/workflows/game-creator/data/step7-playground-manifest-report.json
        inject: file_if_exists
    outputs:
      - path: .agent/workflows/game-creator/data/step8-validate-build-report.json
        struct: validate-build-report
