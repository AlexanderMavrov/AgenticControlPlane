name: visual-qa
version: 1
description: >
  Visual QA tool for Alpha Family VLT games.
  Reads game resource files, applies 50+ validation rules (integrity,
  consistency, convention), optionally validates with screenshot analysis,
  and proposes fixes for detected issues.

params:
  - name: config_path
    description: "Path to visual-qa-config.json (generated by the Visual QA Config UI wizard)"
    required: true

gate:
  structural: false
  semantic: false
  human: false

context:
  carry_forward: summary

steps:

  # ── Step 1: Read all resource files, build structured game model ─────────────
  - name: gather-game-model
    inputs:
      - path: "{config_path}"
        inject: file

    goal: >
      **CACHE CHECK (do this FIRST):**
      Check if the output file already exists at
      `.agent/workflows/visual-qa/reports/game-model-report.json`.
      Also read the config JSON from `config_path` and check `config.options.forceGather`.

      - If the report file EXISTS **and** `forceGather` is NOT `true`:
        → Log "game-model-report.json already exists — skipping gather step (use forceGather:true to rebuild)"
        → Complete this step immediately without reading any resource files.
      - If the report file does NOT exist, OR `forceGather` is `true`:
        → Proceed with the full gather process below.

      ---

      Read the config JSON from the path provided in the `config_path` param.
      Extract these values:
        - resourcesPath  = config.resourcesPath       (e.g. "C:/Workspace/games/resources/burning_hot_coins")
        - resolution     = config.resolution           (e.g. "1920x1080")
        - gameName       = config.gameName             (e.g. "burning_hot_coins")

      Read all resource files for the game at `resourcesPath`.
      Use the `resolution` from the config (default: 1920x1080).

      **What to read (in this order):**

      1. **View registry:**
         `{resourcesPath}/v/{resolution}/RssElementsListData.json`
         → this lists ALL view JSON files. Read every file listed.

      2. **All view files** from the registry:
         `{resourcesPath}/v/{resolution}/*.json` (main views)
         `{resourcesPath}/v/{resolution}/SwButtons/*.json` (button views)

      3. **idata files:**
         `{resourcesPath}/idata/{resolution}/ReelsView.json` → symbols, reel grid config
         `{resourcesPath}/idata/{resolution}/WinFiguresView.json` → win animation mappings
         `{resourcesPath}/idata/{resolution}/LinesView.json` → win lines + sounds
         `{resourcesPath}/idata/{resolution}/StatusLineView.json` → status line config
         `{resourcesPath}/idata/{resolution}/GambleRoundView.json` → gamble config
         `{resourcesPath}/idata/{resolution}/InfoView.json` → info screen config

      4. **Math file:**
         `{resourcesPath}/math/var_*.json` → pick the first one (or the one without "fake" or "Dev" in name)
         Extract: symbolNames, reelsCount, rowsCount, wildId, scatterIds

      5. **RSS manifests:**
         `{resourcesPath}/AllRssData.json` → includes list
         `{resourcesPath}/art/{resolution}/RssImagesData.json` → all image RSS IDs
         `{resourcesPath}/art/{resolution}/RssImagesSeqData.json` → all animation RSS IDs
         `{resourcesPath}/art/{resolution}/RssTextStylesData.json` → text style definitions
         `{resourcesPath}/s/RssAudioData.json` → sound RSS IDs

      **Output:** Build a structured report with:
      - All view files contents (element lists with their properties)
      - idata configs (reel grid, symbols, lines, win figures)
      - Math data (symbol names, grid size, wild/scatter)
      - RSS registry (lists of all image, animation, sound, and style IDs)
      - File inventory (all paths read)
      - Errors (any files that could not be read)

      **== Behavioral Rules ==**

      1. ATTEMPT FIRST: Read all files systematically. If a file doesn't exist,
         note it in errors and continue.

      2. ASK ON AMBIGUITY: If multiple math files exist (excluding DevMath*, fake_*),
         ask the user which one to use.

      3. ONLY SPECIFIED CHANGES: This is a READ-ONLY step. Do NOT modify any files.

      4. RECORD DECISIONS: Record if you had to choose between files or skip missing ones.

      **OUTPUT PATH:** Write the game model report JSON to:
      `.agent/workflows/visual-qa/reports/game-model-report.json`
      Create the directories if they don't exist.

  # ── Step 2: Apply all rules, produce findings ───────────────────────────────
  - name: static-analysis
    inputs:
      - path: "{config_path}"
        inject: file
      - path: .agent/workflows/visual-qa/reports/game-model-report.json
        inject: file
      - path: .agent/docs/visual-qa-rules.md
        inject: file

    goal: >
      Apply ALL validation rules from the visual-qa-rules.md document against
      the game model from the previous step.

      **Rule categories and report levels:**
      - `[I]` Integrity rules → report as **error** (cross-reference failures)
      - `[C]` Consistency rules → report as **error** (self-consistency violations)
      - `[W]` Convention rules → report as **warning** (may be intentional design)

      **Apply rules in this order:**

      1. **N-series (Cross-cutting):** N1 rssKey exists, N2 style exists, N3 unique IDs,
         N4 type properties, N5 resolution consistency, N6 bar values alignment,
         N7 bar labels alignment, N8 bar x-ordering, N9 text fitBox minimum size
      2. **I-series (Reel Grid):** I1 symbol count, I2 sequential IDs, I3 rssId valid,
         I4 dimensions match, I5 cross-file consistency, I6 fits screen
      3. **A-series (Background):** A1 alpha, A2 tint, A3 panel gap, A4 full width,
         A5 18+ position, A6 regulatory not hidden, A7 no unexpected rotation
      4. **B-series (Knobs):** B1 symmetry, B2 same rssKey, B3 within reel area,
         B4 expected alignment
      5. **C-series (Credit):** C1 color, C2 scale, C3 min/max consistency, C4 position
      6. **D-series (Coins):** D1 pure white, D2 consistency with credit, D3 x-ordering
      7. **E-series (Bet):** E1 structure, E2 alignment, E3 button symmetry,
         E4 label x co-located with text
      8. **F-series (Win):** F1 style, F2 position, F3 multi-state
      9. **G-series (Status):** G1 group consistency, G2 zone, G3 sides, G4 idata match
      10. **H-series (Buttons):** H1 rssKeys, H2 co-location, H3 zone, H4 distribution, H5 overlap
      11. **J-series (Win Figures/Lines):** J1-J6
      12. **K-series (Gamble):** K1 cards, K2 history, K3 symmetry, K4 overlay
      13. **L-series (Wheel):** L1 center, L2 text, L3 panel
      14. **M-series (Menus):** M1 spacing, M2 alignment, M3 button symmetry
      15. **O-series (Touch):** O1 spacing, O2 bounds

      **For each rule:**
      - Read the rule definition from visual-qa-rules.md
      - Check the corresponding elements in the game model
      - If the rule is violated, create a finding with: ruleId, category, reportLevel,
        severity, file, element, property, actualValue, expectedValue, description,
        and suggestedFix
      - If the rule passes, note it in rulesPassed
      - If the rule is not applicable (e.g. no gamble round in this game), note in rulesSkipped

      **Severity threshold:** Only include findings with severity >= `config.options.severityThreshold` (default: "low").

      **Rule filtering:** If `config.options.onlyRules` is set, check ONLY those rules.
      Otherwise, if `config.options.skipRules` is set, skip those rules.

      **IMPORTANT:** Apply rules from the document EXACTLY as described. Do not invent
      new rules or modify existing ones. If a rule's detection logic is ambiguous,
      apply the most conservative interpretation (fewer false positives).

      **== Behavioral Rules ==**

      1. ATTEMPT FIRST: Apply all rules systematically, one by one.

      2. ASK ON AMBIGUITY: If a rule cannot be applied because the game model is
         incomplete (missing view file, etc.), skip it and note in rulesSkipped.

      3. ONLY SPECIFIED CHANGES: Analysis only. Do NOT modify any files.

      4. RECORD DECISIONS: Record any rules that were ambiguous to apply or
         interpretations you had to make.

      **OUTPUT PATH:** Write the analysis report JSON to:
      `.agent/workflows/visual-qa/reports/analysis-report.json`

  # ── Step 3: Visual validation (conditional — only if screenshots provided) ──
  - name: visual-validation
    inputs:
      - path: "{config_path}"
        inject: file
      - path: .agent/workflows/visual-qa/reports/analysis-report.json
        inject: file

    goal: >
      Read the config JSON. Extract screenshot paths:
        - screenshotIdle      = config.screenshots.idle       (may be absent)
        - screenshotReference = config.screenshots.reference   (may be absent)

      **CONDITION:** This step should ONLY execute if `screenshotIdle` is present
      in the config. If no screenshot path was given, produce a minimal report
      noting "no screenshots provided" and complete immediately.

      **If screenshots are provided:**

      1. Read the idle screenshot from `screenshotIdle` path.
      2. If `screenshotReference` was provided, also read that screenshot.
         The reference is from a DIFFERENT (correctly working) Alpha Family game —
         use it to understand the general layout structure (reel grid, panel, buttons),
         NOT the specific symbols or theme. All Alpha Family games share the same
         layout conventions, so the reference shows the EXPECTED structure.

      3. Read the analysis report from the previous step.

      ---

      **PART A — Confirm/deny static analysis findings:**

      4. For each finding with severity >= medium from the analysis report:
         - Look at the screenshot and try to confirm: "Can I see this issue?"
         - Mark as "confirmed" or "unconfirmed"
         - Note your confidence level

      ---

      **PART B — Independent visual rule checks:**

      Independently check the following rules by looking at the screenshot
      (and comparing with the reference screenshot if available).
      These checks are INDEPENDENT from static analysis — even if a rule
      passed in Step 2, it may reveal a visual issue here.

      **B.1 — Elements visibility & presence:**
      - **A6** (Regulatory): Is the 18+ badge visible on screen?
        If it cannot be seen at all → flag as "hidden/missing 18+ badge".
        Compare with reference to confirm expected location (usually bottom-left or bottom-right).
      - **Missing elements**: Are there any expected UI elements visible in the
        reference that are completely absent in the idle screenshot?

      **B.2 — Layout & geometry:**
      - **A7** (Rotation): Is the panel/background straight? Any visible tilt
        or rotation? Compare panel edges with reference — they should be
        perfectly horizontal/vertical.
      - **A3** (Panel gap): Is there a visible gap between the reel area and
        the panel below? Compare spacing with reference.
      - **I6** (Grid fit): Does the reel grid fit within the screen? Are symbols
        cut off or overflowing?
      - **B1** (Knob symmetry): Do left and right knobs look symmetric?
        Same size, same vertical position, mirrored horizontally?

      **B.3 — Text readability:**
      - **N9** (fitBox): Are all text labels readable? Look for any text that
        appears crushed, squeezed, or too small to read. Pay special attention
        to bar texts (credit, coins, bet, win amounts).
      - **F1** (Win text style): If a win amount is displayed, does the text
        style look correct (not default/unstyled)?

      **B.4 — Alignment & overlap:**
      - **E4** (Bar labels): Are bar labels (CREDIT, COINS, BET, WIN) each
        positioned above their own value? Look for labels that appear displaced
        or overlapping with another bar's label.
      - **B4** (Knob alignment): Do knobs appear centered on their expected
        position, or are they shifted (e.g., pinned to top-left corner)?
      - **H5** (Button overlap): Do any buttons overlap each other?
      - **E3** (Bet button symmetry): Are bet +/- buttons symmetric around
        the bet bar?

      **B.5 — Z-order & layering:**
      - Are any elements hidden behind other elements that should be visible?
      - Is the panel background covering elements it shouldn't?
      - Are buttons/text visible above the panel, not buried under it?

      **B.6 — General visual scan:**
      - Visual artifacts (rendering glitches, torn textures)
      - Wrong images (element exists but shows unexpected content)
      - Color anomalies (elements that are clearly wrong color vs reference)
      - Any other visual difference between idle and reference that looks
        like a bug rather than a theme difference

      For each visual rule check, report:
      - ruleId (e.g. "A6", "N9") or "VF-xxx" for findings not tied to a specific rule
      - result: "pass" | "fail" | "inconclusive"
      - confidence: "high" | "medium" | "low"
      - description of what was observed
      - If reference was used for comparison, note what differs

      ---

      **Output structure:**
      - `findingsConfirmed` — static analysis findings confirmed visually (Part A)
      - `findingsUnconfirmed` — static analysis findings that could not be confirmed (Part A)
      - `visualRuleChecks` — independent visual checks results (Part B)
      - `additionalFindings` — extra visual issues not tied to any rule (Part B.6)
      - `visionLimitations` — things vision could not reliably check

      **== Behavioral Rules ==**

      1. ATTEMPT FIRST: Analyze screenshots carefully and thoroughly.
         Always compare with reference when available.

      2. ASK ON AMBIGUITY: If screenshot quality is insufficient to confirm
         a finding, mark as "inconclusive" with reason, don't guess.

      3. ONLY VALIDATE: Do NOT propose fixes. Only report what you see.

      4. VISION LIMITATIONS: Be honest about what you CAN'T reliably check:
         - Exact pixel positions (subtle shifts < 20px)
         - Alpha/opacity values
         - Exact color hex values
         - Properties that have no visual effect in idle state
         Note these in `visionLimitations`.

      5. REFERENCE COMPARISON: When comparing with reference, focus on
         STRUCTURAL differences (layout, element presence, alignment),
         NOT theme differences (colors, symbols, specific images).

      6. RECORD DECISIONS: Note confidence level for each check and
         whether reference was used for comparison.

      **OUTPUT PATH:** Write the visual validation report JSON to:
      `.agent/workflows/visual-qa/reports/visual-report.json`

  # ── Step 4: Propose and apply fixes ─────────────────────────────────────────
  - name: fix-issues
    gate:
      human: true

    inputs:
      - path: "{config_path}"
        inject: file
      - path: .agent/workflows/visual-qa/reports/analysis-report.json
        inject: file
      - path: .agent/workflows/visual-qa/reports/visual-report.json
        inject: file_if_exists

    goal: >
      Read the config JSON. Extract:
        - autoFix = config.options.autoFix   (default: false)

      Review findings from the analysis report and (if available) the visual
      validation report. Propose and optionally apply fixes.

      **Auto-fix mode:** If `autoFix` is true, apply fixes without asking
      for each one. If false (default), present each fix and wait for
      user approval.

      **Process (prioritized by severity: critical → high → medium → low):**

      1. For each finding:
         a. Read the source file specified in the finding
         b. Identify the exact JSON path to modify
         c. Determine the correct value:
            - For `[I]` integrity findings: fix the broken reference
            - For `[C]` consistency findings: use the majority/expected value from sibling elements
            - For `[W]` convention findings: use the reference value from the rule, but
              INFORM the user this is convention-based and may be intentional
         d. If `auto_fix` is "true": apply the change
         e. If `auto_fix` is "false": describe the proposed change and ASK user to approve

      2. For findings that were "confirmed" in visual validation, increase confidence.
         For "unconfirmed" findings, note this when presenting to user.

      **IMPORTANT:**
      - Modify ONLY the specific JSON property identified in the finding.
      - Do NOT change anything else in the file.
      - Do NOT "improve" or refactor unrelated values.
      - For `[W]` convention findings: always mention that this may be by design.

      **== Behavioral Rules ==**

      1. ATTEMPT FIRST: Propose fixes based on the rules and reference values.

      2. ASK ON AMBIGUITY: If the "correct" value is unclear (e.g. what should
         the right knob y-position be?), present options with reasoning and
         let the user decide.

      3. ONLY SPECIFIED CHANGES: Fix ONLY the properties flagged in findings.
         Do NOT touch any other values in the files.

      4. RECORD DECISIONS: Record every fix applied, skipped, or user-approved.

      **OUTPUT PATH:** Write the fix report JSON to:
      `.agent/workflows/visual-qa/reports/fix-report.json`
