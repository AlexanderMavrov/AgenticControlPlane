name: integrations-report
version: 1
description: >
  Report from Step 6 (create-integrations).
  Lists all integration directories created and modifications made.
type: object

required:
  - integrations_processed
  - status

properties:
  integrations_processed:
    type: array
    description: "Per-integration results"
    min_items: 1
    items:
      type: object
      required: [integration, directories_created, status]
      properties:
        integration:
          type: string
          description: "Integration name (e.g. astro, playground, inspired, playtech)"
        directories_created:
          type: array
          description: "List of new directories created"
          items:
            type: object
            required: [from, to]
            properties:
              from:
                type: string
              to:
                type: string
        files_renamed:
          type: integer
          description: "Number of files renamed inside copied directories"
        files_modified:
          type: integer
          description: "Number of files with content replacements"
        total_replacements:
          type: integer
          description: "Total text replacements across all files"
        status:
          type: string
          enum: [success, skipped, failed]
        warnings:
          type: array
          items:
            type: string
  decisions:
    type: array
    description: "Non-trivial decisions made during this step"
    items:
      type: object
      required: [question, resolution, resolved_by]
      properties:
        question:
          type: string
          description: "The question or ambiguity that arose"
        options_considered:
          type: array
          items:
            type: string
          description: "Potential solutions that were evaluated"
        resolution:
          type: string
          description: "The chosen solution and reasoning"
        resolved_by:
          type: string
          enum: [agent, user]
          description: "Whether the agent decided autonomously or the user was consulted"
  errors:
    type: array
    description: "Any errors encountered"
    items:
      type: string
  status:
    type: string
    enum: [success, partial, failed]
