name: copy-plugin-report
version: 1
description: >
  Report from Step 1 (copy-and-rename-plugin).
  Lists all copied files, renamed directories, renamed files, and any errors.
type: object

required:
  - prototype
  - new_game
  - plugin_path
  - total_files_copied
  - directories_renamed
  - files_renamed
  - status

properties:
  prototype:
    type: string
    description: "Source game snake_case name (e.g. burning_hot_coins)"
  new_game:
    type: string
    description: "New game snake_case name (e.g. dragon_fortune)"
  plugin_path:
    type: string
    description: "Absolute path to the newly created plugin directory"
  total_files_copied:
    type: integer
    description: "Total number of files copied"
  directories_renamed:
    type: array
    description: "List of directories that were renamed"
    items:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
        to:
          type: string
  files_renamed:
    type: array
    description: "List of files that were renamed"
    items:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
        to:
          type: string
  decisions:
    type: array
    description: "Non-trivial decisions made during this step"
    items:
      type: object
      required: [question, resolution, resolved_by]
      properties:
        question:
          type: string
          description: "The question or ambiguity that arose"
        options_considered:
          type: array
          items:
            type: string
          description: "Potential solutions that were evaluated"
        resolution:
          type: string
          description: "The chosen solution and reasoning"
        resolved_by:
          type: string
          enum: [agent, user]
          description: "Whether the agent decided autonomously or the user was consulted"
  errors:
    type: array
    description: "Any errors encountered during the copy/rename process"
    items:
      type: string
  status:
    type: string
    enum: [success, partial, failed]
    description: "Overall status of the step"
