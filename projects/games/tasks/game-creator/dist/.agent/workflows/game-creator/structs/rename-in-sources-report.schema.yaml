name: rename-in-sources-report
version: 1
description: >
  Report from Step 2 (rename-in-source-files).
  Lists all files modified and replacement counts.
type: object

required:
  - plugin_path
  - files_modified
  - replacements_count
  - pascal_replacements
  - snake_replacements
  - status

properties:
  plugin_path:
    type: string
    description: "Absolute path to the plugin directory that was modified"
  files_modified:
    type: array
    description: "List of files that were changed (relative to plugin directory)"
    items:
      type: string
  replacements_count:
    type: integer
    description: "Total number of text replacements made across all files"
  pascal_replacements:
    type: integer
    description: "Count of OldPascal → NewPascal replacements"
  snake_replacements:
    type: integer
    description: "Count of old_snake → new_snake replacements (in CMakeLists.txt)"
  decisions:
    type: array
    description: "Non-trivial decisions made during this step"
    items:
      type: object
      required: [question, resolution, resolved_by]
      properties:
        question:
          type: string
          description: "The question or ambiguity that arose"
        options_considered:
          type: array
          items:
            type: string
          description: "Potential solutions that were evaluated"
        resolution:
          type: string
          description: "The chosen solution and reasoning"
        resolved_by:
          type: string
          enum: [agent, user]
          description: "Whether the agent decided autonomously or the user was consulted"
  errors:
    type: array
    description: "Any errors encountered during the replacement process"
    items:
      type: string
  status:
    type: string
    enum: [success, partial, failed]
    description: "Overall status of the step"
