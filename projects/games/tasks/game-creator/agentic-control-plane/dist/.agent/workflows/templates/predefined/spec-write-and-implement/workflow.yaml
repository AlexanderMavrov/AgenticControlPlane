name: spec-write-and-implement
version: 4
description: >
  Write or update a behavioral spec, then delegate to spec-enforcement
  to implement the requirement in code, verify no violations, and register.
  Triggered by [specs::ComponentName] pattern, [spec] pattern (auto-discovery),
  or /spec add command.

params:
  - name: component
    description: >
      Component name (e.g., EditField, MessageQueue).
      If not provided, the CLARIFY step enters auto-discovery mode:
      analyzes the requirements text, scans existing specs, and proposes
      a component name and domain for user approval.
    required: false

  - name: domain
    description: >
      Logical domain for the spec (e.g., ui, messaging, recovery).
      If not provided, determine from context or ask the user.
    required: false

  - name: requirements
    description: >
      Initial requirements text from the user's message.
      Will be refined in the CLARIFY step.
    required: false

  - name: implement
    description: >
      Whether to implement the spec in code after writing it.
      Set to "false" if only creating/updating the spec without code changes.
    required: false
    default: "true"

gate:
  structural: true
  semantic: true
  human: false
  max_gate_retries: 5
  max_step_retries: 3

context:
  carry_forward: summary

steps:
  # ──────────────────────────────────────────────
  # Step 1: CLARIFY
  # Interactive: refine requirements with the user.
  # Human gate — user approves the final formulation.
  # ──────────────────────────────────────────────
  - name: clarify
    spec_check: false
    goal: >
      Refine the behavioral requirements for a component spec.


      MODE A — Targeted (when "{component}" is provided):

      Proceed directly to step 1 below using the given component name.


      MODE B — Auto-discovery (when "{component}" is empty or not provided):

      The user described requirements without specifying a component name.
      You must discover the right target:

      a. Read .agent/specs/_index.json to get all existing specs.
      b. Read the "requirements" param — this is the user's raw description.
      c. Analyze the text: what component, module, or feature is this about?
      d. Search existing specs for overlapping or related requirements:
         - Same component under a different name?
         - Existing spec that already covers part of this?
         - A domain that clearly matches?
      e. Check _registry.json for implementation status:
         - Is there code that ALREADY implements this behavior but has no spec?
         - Is part of this requirement already covered by another spec?
         - Are there source files that do something similar?
         Report what you find — this helps the user avoid duplicating work.
      f. Propose to the user:
         - "I believe this belongs to component [NAME] in domain [DOMAIN]."
         - "Related existing specs: [list, if any]."
         - "Already implemented (no spec): [files, if any]."
         - "Is this a NEW spec or an UPDATE to an existing one?"
      g. Wait for the user to confirm or correct the component name.
      h. Use the confirmed name as {component} for all subsequent steps.


      STEPS (both modes):

      1. Read the initial requirements from the "requirements" param (if provided).
      2. Check if .agent/specs/ already has a spec for this component:
         - Search .agent/specs/**/{component}.md
         - If found: read current requirements, show them to the user
         - Also check _registry.json: are there files that implement this component?
           If code exists but no spec, tell the user: "This behavior appears to be
           already implemented in [files] but has no spec. I'll create a spec that
           documents the existing behavior and adds your new requirements."
         - Check OTHER specs for overlapping requirements:
           Could any of the user's requirements already be covered by a different spec?
           If so, warn: "Requirement X may overlap with spec [Y]. Should I merge or keep separate?"
      3. Analyze the requirements for clarity and completeness:
         - Are there ambiguous terms? Ask the user.
         - Are there missing edge cases? Suggest them.
         - What severity level? MUST / SHOULD / MAY for each requirement.
      4. Draft a CONCISE summary in structured format:
         - Each requirement as a bullet point with MUST/SHOULD/MAY prefix
         - Constraints (if any)
         - Examples (if relevant)
      5. Present the summary to the user for approval.

      DO NOT proceed until the user approves the formulation.

      Output: a JSON file with the approved requirements.
      IMPORTANT: The "component" field in the output MUST contain the confirmed
      component name (whether provided as param or discovered in auto-discovery).
    subagent: true
    inputs:
      - path: ".agent/specs/**/{component}.md"
        inject: file_if_exists
      - path: ".agent/specs/_index.json"
        inject: file_if_exists
      - path: ".agent/specs/_registry.json"
        inject: file_if_exists
    outputs:
      - path: data/approved-requirements.json
        struct: approved-requirements
    param_bindings:
      component: "data/approved-requirements.json::component"
      domain: "data/approved-requirements.json::domain"
    gate:
      human: true

  # ──────────────────────────────────────────────
  # Step 2: WRITE-SPEC
  # Create or update the spec file.
  # ──────────────────────────────────────────────
  - name: write-spec
    spec_check: false
    goal: >
      Write or update the behavioral spec.

      Read the component name from data/approved-requirements.json (the "component" field).
      If the "{component}" param was provided, use it; otherwise the CLARIFY step
      discovered and confirmed the component name with the user.

      1. Read the approved requirements from data/approved-requirements.json.
      2. Determine the domain:
         - If "domain" param is set: use it
         - If an existing spec was found in CLARIFY: use its domain
         - Otherwise: infer from context or use "general"
      3. Create/update .agent/specs/{domain}/{component}.md:
         - Proper YAML frontmatter (spec_id, component, domain, tags, status, dates)
         - ## Requirements section with approved text
         - ## Constraints section if applicable
         - ## Examples section if provided
         - ## Source section with changelog entry (date + what changed)
      4. Update .agent/specs/_index.json:
         - Add or update the entry for this spec
         - Update the updated_at timestamp

      Read .agent/docs/specs.md for the exact format reference.
    subagent: true
    inputs:
      - path: data/approved-requirements.json
        struct: approved-requirements
      - path: ".agent/specs/**/{component}.md"
        inject: file_if_exists
      - path: ".agent/specs/_index.json"
        inject: file_if_exists
      - path: ".agent/docs/specs.md"
        inject: file
    outputs:
      - path: ".agent/specs/{domain}/{component}.md"
      - path: ".agent/specs/_index.json"

  # ──────────────────────────────────────────────
  # Step 3: ENFORCE (delegate_to)
  # Hand-off to spec-enforcement for implementation,
  # verification, and registration.
  # Skipped if implement=false.
  # ──────────────────────────────────────────────
  - name: enforce
    goal: >
      IF the "implement" param is "false": skip this step entirely.

      OTHERWISE: delegate to spec-enforcement to implement the spec in code,
      verify no other specs are violated, and register the implementation.
    delegate_to: spec-enforcement
    params:
      component: "{component}"
      domain: "{domain}"
      spec_path: ".agent/specs/{domain}/{component}.md"
