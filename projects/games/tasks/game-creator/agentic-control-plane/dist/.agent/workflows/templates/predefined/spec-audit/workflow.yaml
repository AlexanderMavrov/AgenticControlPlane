name: spec-audit
version: 1
description: >
  Read-only QA compliance audit: scan source code against behavioral specs
  and report violations. NEVER modifies any source code, spec files, or
  registry files — produces a structured audit report grouped by severity.

  Supports filtering by domain, component, spec_id, or severity level.
  Optional suggest_fixes mode includes concrete remediation suggestions
  (text only — no actual code edits).

params:
  - name: domain
    description: >
      Filter audit to a specific domain (e.g., "recovery", "messaging").
      If not provided, all domains in _index.json are audited.
    required: false

  - name: component
    description: >
      Filter audit to a specific component (e.g., "EditField").
      If not provided, all components in the selected domain(s) are audited.
    required: false

  - name: spec_id
    description: >
      Filter audit to a single spec by spec_id (e.g., "ui/EditField").
      Most specific filter — overrides domain and component if set.
    required: false

  - name: severity_filter
    description: >
      Minimum severity level to check. "all" checks MUST+SHOULD+MAY.
      "must" checks only MUST requirements. "must+should" checks MUST
      and SHOULD, skips MAY.
    required: false
    default: "all"

  - name: suggest_fixes
    description: >
      When "true", scan results include suggested code changes for each
      violation (text description, not actual edits). When "false" (default),
      report only — no fix suggestions.
    required: false
    default: "false"

  - name: include_unregistered
    description: >
      When "true", SCAN subagents also search the codebase for files
      matching component names that are not in _registry.json. When "false"
      (default), only files from _registry.json mappings are checked.
    required: false
    default: "false"

gate:
  structural: true
  semantic: true
  human: false
  max_gate_retries: 5
  max_step_retries: 3

context:
  carry_forward: summary

steps:
  # ──────────────────────────────────────────────
  # Step 1: DISCOVER
  # Resolve audit scope — which specs, which files.
  # Human gate — user confirms before scan fan-out.
  # ──────────────────────────────────────────────
  - name: discover
    spec_check: false
    goal: >
      Determine the audit scope: which specs to check and which source files
      to scan. This is a PLANNING step — do NOT read source files yet, only
      resolve paths and metadata.

      **IMPORTANT: This workflow is PURE READ-ONLY. You must NOT create,
      modify, or delete any files outside of the workflow data directory.**

      **Step-by-step:**

      1. Read .agent/specs/_index.json to get the full list of active specs.
         If _index.json does not exist or is empty:
         - Report "No specs found. Run doc-spec-extraction or create specs
           manually before running spec-audit."
         - Write a discovery-plan.json with empty domains array and
           status "no_specs_found". The gate will pass but SCAN will
           produce an empty report.

      2. Apply filters (most specific wins):
         - If "spec_id" param is set: find that single spec. If not found,
           list the 3 closest matches and STOP — ask user to clarify.
         - Else if "component" param is set: filter to specs matching
           that component name (across all domains, or within "domain"
           if also set).
         - Else if "domain" param is set: filter to all specs in that domain.
         - Else: include ALL active specs.

      3. Apply severity_filter:
         - "all" → check MUST, SHOULD, and MAY
         - "must" → check only MUST requirements
         - "must+should" → check MUST and SHOULD, skip MAY
         Record the active severity levels in the discovery plan.

      4. Read .agent/specs/_registry.json to resolve implementation files.
         For each spec in scope:
         - Find its entry in _registry.json mappings
         - Collect all "implemented_by" file paths (all relationship types)
         - If a spec has NO entry in _registry.json: mark it as
           "no_registry_mapping" — it can still be audited if
           "include_unregistered" is true (subagent will search codebase)
         - If a spec has an entry but implemented_by is empty: mark as
           "no_implementation_files"

      5. Group specs by domain. For each domain, produce:
         - domain name
         - list of specs to audit (spec_id, title, severity levels present,
           spec file path, implementation files from registry)
         - status: "pending"
         - estimated_files: total number of source files to scan

      6. Produce a discovery-plan.json with:
         - audit scope summary (total specs, total domains, total files)
         - filters applied (domain, component, spec_id, severity_filter)
         - severity_levels: which levels are active
         - suggest_fixes: boolean (from param)
         - include_unregistered: boolean (from param)
         - domains array (one entry per domain, each with specs and files)
         - warnings: any specs with no registry mapping, missing files, etc.

      Present a clear summary to the user showing what will be audited.
    subagent: true
    inputs:
      - path: ".agent/specs/_index.json"
        inject: file_if_exists
      - path: ".agent/specs/_registry.json"
        inject: file_if_exists
    outputs:
      - path: data/discovery-plan.json
        struct: discovery-plan
    gate:
      human: true

  # ──────────────────────────────────────────────
  # Step 2: SCAN
  # Parallel per-domain. Each subagent reads specs
  # + source files and checks compliance.
  # READ-ONLY — never modifies source code.
  # ──────────────────────────────────────────────
  - name: scan
    spec_check: false
    goal: >
      For the assigned domain, check every in-scope spec requirement against
      the implementing source code. Report all violations found.

      **CRITICAL: This is a READ-ONLY audit. Do NOT modify any source code
      files, spec files, or registry files. Only READ and REPORT.**

      **Step-by-step for each spec in this domain:**

      1. Read the spec file from .agent/specs/{domain}/.
      2. Parse all requirements from the ## Requirements section. Each
         requirement has a severity level (MUST, SHOULD, MAY). Only check
         requirements whose severity is in the active severity_levels
         from the discovery plan.
      3. Read each implementing source file listed in the discovery plan
         for this spec.
         If "include_unregistered" is true in the discovery plan AND
         the spec has "no_registry_mapping" status:
         - Search the codebase for files matching the component name
           (PascalCase, kebab-case, snake_case variants)
         - EXCLUDE: node_modules/, .agent/, .cursor/, dist/, build/
         - Include any matched files in the scan
      4. For EACH requirement at active severity level:
         a. Read the relevant source code sections
         b. Determine compliance status:
            - "compliant" — code satisfies the requirement
            - "violation" — code clearly violates the requirement
            - "partial" — code partially satisfies (some cases handled,
              others not)
            - "unverifiable" — cannot determine from static code analysis
              alone (e.g., runtime behavior, external dependencies, or
              implementation file not found)
         c. For violations and partials:
            - Identify the file path and approximate line number
            - Quote the relevant code snippet (max 5 lines)
            - Explain HOW it violates the requirement
            - Rate the impact: "critical" (breaks core behavior),
              "moderate" (degrades functionality), "minor" (cosmetic/edge case)

      5. IF "suggest_fixes" is true in the discovery plan:
         For each violation, include a "suggested_fix" field with a
         concrete description of what code change would resolve the
         violation. Use before/after snippets where practical.
         Keep suggestions minimal — only the necessary change.
         IF "suggest_fixes" is false: omit the suggested_fix field entirely.

      6. Produce a scan-result JSON for this domain with:
         - domain name
         - specs_checked: number of specs checked
         - requirements_checked: total requirements evaluated
         - status counts: compliant, violation, partial, unverifiable
         - per-spec results with per-requirement compliance details
         - violations_summary: flat list of violations with severity and impact
    subagent: true
    parallel: true
    parallel_key: "discovery-plan.domains[status=pending]"
    inputs:
      - path: data/discovery-plan.json
        struct: discovery-plan
      - path: ".agent/specs/{domain}/*.md"
        inject: file
      - path: ".agent/specs/_registry.json"
        inject: file_if_exists
    outputs:
      - path: "data/scans/{domain}-scan-result.json"
        struct: scan-result

  # ──────────────────────────────────────────────
  # Step 3: REPORT
  # Consolidate all scan results into a final
  # structured, actionable audit report.
  # ──────────────────────────────────────────────
  - name: report
    spec_check: false
    goal: >
      Consolidate all domain scan results into a single, structured,
      actionable audit report.

      **CRITICAL: This is a READ-ONLY step. Do NOT modify any files outside
      the workflow data directory.**

      **Step-by-step:**

      1. Read all scan result files from data/scans/.
      2. Aggregate statistics:
         - Total specs checked across all domains
         - Total requirements checked
         - Total violations, partials, unverifiable, compliant
         - Compliance rate: (compliant / total_checked) * 100
         - Breakdown by severity: MUST violations, SHOULD violations,
           MAY violations

      3. Group violations by severity (MUST first, then SHOULD, then MAY).
         Within each severity group, order by impact
         (critical > moderate > minor).

      4. For each violation, include:
         - spec_id, requirement text, severity, impact
         - file path, line number, code snippet
         - explanation of the violation
         - suggested_fix (only if suggest_fixes mode was enabled)

      5. Produce domain-level summaries:
         - Per domain: compliance rate, number of violations, top issues
         - Identify "cleanest" domain (highest compliance) and
           "most problematic" domain (lowest compliance)

      6. Generate actionable recommendations:
         - Priority 1: MUST violations with critical impact — these are bugs
         - Priority 2: MUST violations with moderate impact
         - Priority 3: SHOULD violations
         - Priority 4: Partial compliance items
         - For each priority level: list affected specs

      7. Write the audit-report.json with full structured data.

      8. Print a human-readable SUMMARY to the chat:

         ── SPEC AUDIT REPORT ──
         Date: {date}
         Scope: {N} specs across {M} domains
         Filters: {applied filters}

         COMPLIANCE OVERVIEW:
         Compliant: N (X%)
         Violations: N
         Partial: N
         Unverifiable: N

         VIOLATIONS BY SEVERITY:
         MUST:   N violations (N critical, N moderate, N minor)
         SHOULD: N violations
         MAY:    N violations

         TOP ISSUES:
         1. [MUST/critical] {spec_id}: {brief description} — {file}:{line}
         2. ...
         (up to 10)

         PER-DOMAIN SUMMARY:
         {domain}: {compliance%} — {N violations}
         ...

         NEXT STEPS:
         - Fix N MUST/critical violations (highest priority)
         - Review N partial compliance items
         - Run /run-workflow spec-enforcement to auto-fix specific violations
    subagent: true
    inputs:
      - path: "data/scans/*-scan-result.json"
        inject: file
      - path: data/discovery-plan.json
        inject: file
    outputs:
      - path: data/audit-report.json
        struct: audit-report
