name: approved-requirements
description: >
  Output of the CLARIFY step — user-approved behavioral requirements
  ready to be written to a spec file.
format: json

json_schema:
  required_fields:
    - field: component
      type: string
      pattern: "^[A-Za-z][A-Za-z0-9_-]*$"
    - field: domain
      type: string
      pattern: "^[a-z][a-z0-9_-]*$"
    - field: is_update
      type: boolean
    - field: requirements
      type: array
      min_items: 1
    - field: requirements[].text
      type: string
    - field: requirements[].severity
      type: string
      enum: [MUST, SHOULD, MAY]
    - field: constraints
      type: array
    - field: examples
      type: array
    - field: approved_by_user
      type: boolean
    - field: existing_spec_path
      type: string
