name: validation-report
description: >
  Output of the VALIDATE step — per-spec validation results after
  cross-checking drafts against the source document and existing specs.
  Includes accuracy, completeness, consistency, and traceability checks.
format: json

json_schema:
  required_fields:
    - field: workflow
      type: string
    - field: validated_at
      type: string
    - field: total_specs
      type: number
    - field: overall_quality
      type: number
    - field: summary
      type: object
    - field: summary.valid
      type: number
    - field: summary.issues_found
      type: number
    - field: summary.conflict
      type: number
    - field: summary.regression
      type: number
    - field: summary.coverage_gap
      type: number
    - field: results
      type: array
    - field: results[].spec_id
      type: string
    - field: results[].domain
      type: string
    - field: results[].draft_path
      type: string
    - field: results[].status
      type: string
      enum: [valid, issues_found, conflict, regression, coverage_gap]
    - field: results[].checks_performed
      type: array
      min_items: 6
    - field: results[].checks_passed
      type: array
    - field: results[].issues
      type: array
    - field: discrepancies
      type: array

file_checks:
  exists: true
  min_size: 100
