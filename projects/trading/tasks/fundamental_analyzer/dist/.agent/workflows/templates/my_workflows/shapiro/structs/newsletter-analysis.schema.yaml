name: newsletter-analysis
description: >
  Validates the newsletter analysis step output. Contains a list of
  updated narrative files with their current consensus and processing details.
format: json

json_schema:
  required_fields:
    - field: analyzed_at
      type: string
    - field: newsletters_found
      type: number
    - field: newsletters_read
      type: number
    - field: narratives
      type: array
    - field: narratives[].symbol
      type: string
    - field: narratives[].action
      type: string
    - field: narratives[].consensus_direction
      type: string
    - field: narratives[].consensus_strength
      type: number
    - field: narratives[].newsletters_processed
      type: number
