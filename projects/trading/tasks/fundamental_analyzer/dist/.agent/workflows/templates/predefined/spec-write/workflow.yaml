name: spec-write
version: 1
description: >
  Write or update a behavioral spec — discover overlaps, clarify requirements
  with the user, write the spec file, and register it in the spec index.
  Standalone workflow: does NOT implement code. For implementation, use
  spec-enforcement or spec-write-and-implement (which delegates here first).

params:
  - name: component
    description: >
      Component/subsystem/convention name (e.g., EditField, nvram, exit-code).
      If not provided, the DISCOVER step enters auto-discovery mode:
      analyzes the requirements text, scans existing specs, and proposes
      a component name and domain for user approval.
    required: false

  - name: domain
    description: >
      Logical domain for the spec (e.g., ui, messaging, protocol).
      If not provided, determined during DISCOVER/CLARIFY.
    required: false

  - name: requirements
    description: >
      Initial requirements text from the user's message.
      Will be refined in the CLARIFY step.
    required: false

gate:
  structural: true
  semantic: true
  human: false
  max_gate_retries: 5
  max_step_retries: 3

steps:
  # ──────────────────────────────────────────────
  # Step 1: DISCOVER
  # Check if a spec already exists, find overlaps,
  # contradictions, and related specs.
  # In auto-discovery mode: identify the component.
  # ──────────────────────────────────────────────
  - name: discover
    spec_check: false
    goal: >
      Analyze existing specs to prepare for writing a new or updated spec.


      MODE A — Targeted (when "{component}" is provided):

      1. Search .agent/specs/**/{component}.md — does a spec already exist?
      2. Read _registry.json — are there files that implement this component?
         If code exists but no spec, note: "Behavior appears already implemented
         in [files] but has no spec."
      3. Read _index.json to check OTHER specs for overlapping requirements:
         Could any existing spec already cover part of the user's requirements?
      4. Produce a discovery report:
         - spec_exists: true/false
         - existing_spec_path: path (or null)
         - existing_requirements: list (if spec exists)
         - implemented_files: list (from registry, if any)
         - overlapping_specs: list of { spec_id, overlap_description }
         - contradictions: list of potential contradictions with existing specs


      MODE B — Auto-discovery (when "{component}" is empty or not provided):

      The user described requirements without specifying a component name.
      You must discover the right target:

      1. Read the "requirements" param — this is the user's raw description.
      2. Read _index.json to get all existing specs.
      3. Analyze the text: what component, module, or feature is this about?
      4. Search existing specs for overlapping or related requirements:
         - Same component under a different name?
         - Existing spec that already covers part of this?
         - A domain that clearly matches?
      5. Check _registry.json for implementation status:
         - Is there code that ALREADY implements this behavior but has no spec?
      6. Propose a component name and domain in the output.
         The CLARIFY step will present this to the user for confirmation.
      7. Produce the same discovery report as Mode A, plus:
         - proposed_component: string
         - proposed_domain: string


      IMPORTANT: Do NOT ask the user anything in this step.
      Just analyze and report. User interaction happens in CLARIFY.
    subagent: false
    inputs:
      - path: ".agent/specs/_index.json"
        inject: file_if_exists
      - path: ".agent/specs/_registry.json"
        inject: file_if_exists
      - path: ".agent/specs/**/{component}.md"
        inject: file_if_exists
    outputs:
      - path: data/discovery-report.json
        struct: discovery-report

  # ──────────────────────────────────────────────
  # Step 2: CLARIFY
  # Interactive: refine requirements with the user.
  # Human gate — user approves the final formulation.
  # ──────────────────────────────────────────────
  - name: clarify
    spec_check: false
    goal: >
      Refine the behavioral requirements with the user, using the discovery
      report as context.

      1. Read the discovery report from the previous step.

      2. If auto-discovery mode (proposed_component is set):
         Present the proposal to the user:
         - "I believe this belongs to component [NAME] in domain [DOMAIN]."
         - "Related existing specs: [list, if any]."
         - "Already implemented (no spec): [files, if any]."
         - "Is this a NEW spec or an UPDATE to an existing one?"
         Wait for the user to confirm or correct.

      3. If a spec already exists (spec_exists: true):
         Show current requirements and ask:
         "Which requirements should I add/change?"

      4. If overlaps or contradictions were found:
         Present them: "Warning: requirement X may overlap with spec Y."
         Ask the user how to proceed.

      5. Analyze the requirements for clarity and completeness:
         - Are there ambiguous terms? Ask the user.
         - Are there missing edge cases? Suggest them.
         - What severity level? MUST / SHOULD / MAY for each requirement.

      6. Draft a CONCISE summary in structured format:
         - Each requirement as a bullet point with MUST/SHOULD/MAY prefix
         - Constraints (if any)
         - Examples (if relevant)

      7. Present the summary to the user for approval.

      DO NOT proceed until the user approves the formulation.

      Output: a JSON file with the approved requirements.
      IMPORTANT: The "component" field in the output MUST contain the confirmed
      component name (whether provided as param or discovered).
    subagent: false
    inputs:
      - path: data/discovery-report.json
        struct: discovery-report
    outputs:
      - path: data/approved-requirements.json
        struct: approved-requirements
    param_bindings:
      component: "data/approved-requirements.json::component"
      domain: "data/approved-requirements.json::domain"
    gate:
      human: true

  # ──────────────────────────────────────────────
  # Step 3: WRITE-SPEC
  # Create or update the spec file.
  # ──────────────────────────────────────────────
  - name: write-spec
    spec_check: false
    goal: >
      Write or update the behavioral spec file.

      1. Read the approved requirements from data/approved-requirements.json.
      2. Determine the domain:
         - If "domain" param is set: use it
         - If an existing spec was found in DISCOVER: use its domain
         - Otherwise: infer from context or use "general"
      3. Create/update .agent/specs/{domain}/{component}.md:
         - Proper YAML frontmatter (spec_id, component, domain, tags, status, dates)
         - ## Requirements section with approved text
         - ## Constraints section if applicable
         - ## Examples section if provided
         - ## Source section with changelog entry (date + what changed)
      4. Read .agent/docs/specs.md for the exact format reference.

      Output the path to the written spec file.
    subagent: false
    inputs:
      - path: data/approved-requirements.json
        struct: approved-requirements
      - path: ".agent/specs/**/{component}.md"
        inject: file_if_exists
      - path: ".agent/docs/specs.md"
        inject: file
    outputs:
      - path: ".agent/specs/{domain}/{component}.md"

  # ──────────────────────────────────────────────
  # Step 4: REGISTER-SPEC
  # Update _index.json with the new/updated spec.
  # ──────────────────────────────────────────────
  - name: register-spec
    spec_check: false
    goal: >
      Register the spec in the spec index.

      1. Read .agent/specs/_index.json (or create if missing)
      2. Add or update the entry for the spec:
         - spec_id: "{domain}/{component}"
         - component: "{component}"
         - domain: "{domain}"
         - path: "specs/{domain}/{component}.md"
         - status: "active"
         - updated_at: current date
      3. Update the top-level updated_at timestamp
      4. Write the updated _index.json

      Note: This step registers the SPEC in the index.
      Implementation file registration (_registry.json) is handled
      by spec-enforcement workflow, not here.
    subagent: false
    inputs:
      - path: ".agent/specs/_index.json"
        inject: file_if_exists
      - path: data/approved-requirements.json
        inject: reference
    outputs:
      - path: ".agent/specs/_index.json"
