name: scoring-result
description: >
  Validates the Shapiro scoring output. Contains per-market scores with
  COT, news failure, and narrative components, confidence levels, and bias.
  Only markets with score >= 50 are included.
format: json

json_schema:
  required_fields:
    - field: scored_at
      type: string
    - field: markets_analyzed
      type: number
    - field: markets_qualifying
      type: number
    - field: results
      type: array
    - field: results[].symbol
      type: string
    - field: results[].total_score
      type: number
    - field: results[].confidence
      type: string
    - field: results[].bias
      type: string
    - field: results[].cot_score
      type: number
    - field: results[].cot_percentile
      type: number
    - field: results[].cot_crowding
      type: string
    - field: results[].news_failure_score
      type: number
    - field: results[].news_failure_detail
      type: string
    - field: results[].narrative_score
      type: number
    - field: results[].narrative_detail
      type: string
    - field: results[].contrarian_thesis
      type: string
