name: context-summary
description: >
  Validates the load-context step output. Summarizes the pipeline data,
  memory state, and narrative freshness for downstream steps.
format: json

json_schema:
  required_fields:
    - field: pipeline_generated_at
      type: string
    - field: cot_extreme_count
      type: number
    - field: markets_with_failures
      type: array
    - field: memory_exists
      type: boolean
    - field: narrative_files
      type: array
