                          onchange="updateTool(${i}, 'input_schema', this.value)">${esc(t.input_schema)}</textarea>
              </div>
            </details>
          ` : `
            <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">
              <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);cursor:pointer">
                <input type="checkbox" ${t.required ? 'checked' : ''} style="width:14px;height:14px;accent-color:var(--accent)"
                       onchange="updateTool(${i}, 'required', this.checked)">
                <span>Required ${helpBtn('tool.required')} <span style="font-size:10px;color:var(--text-muted)">(blocks workflow if unavailable)</span></span>
              </label>
              <span style="font-size:11px;color:var(--text-muted);font-style:italic">Description comes from the MCP server automatically</span>
            </div>
            <details style="margin-top:8px" open>
              <summary style="font-size:12px;color:var(--text-secondary);cursor:pointer;user-select:none">Expected Tools ${helpBtn('tool.expected_tools')} <span style="font-size:10px;color:var(--text-muted)">(required for Claude Code per-step subagents)</span></summary>
              <div style="margin-top:6px">
                <span style="font-size:10px;color:var(--text-muted);display:block;margin-bottom:4px">Comma-separated list of tool names from this MCP server that workflow steps will use. Init-workflow.py writes these into the per-step subagent's tools whitelist as mcp__&lt;server&gt;__&lt;tool&gt;.</span>
                <input type="text" class="field-input" placeholder="extract_text, get_metadata, count_pages" style="width:100%;font-size:11px;font-family:var(--mono);padding:5px 8px"
                       value="${esc(t.expected_tools)}"
                       onchange="updateTool(${i}, 'expected_tools', this.value)">
              </div>
            </details>
            <details style="margin-top:8px">
              <summary style="font-size:12px;color:var(--text-secondary);cursor:pointer;user-select:none">Server Config ${helpBtn('tool.server_config')} <span style="font-size:10px;color:var(--text-muted)">(optional, legacy)</span></summary>
              <div style="margin-top:6px">
                <span style="font-size:10px;color:var(--text-muted);display:block;margin-bottom:4px">Legacy field — kept for backward compatibility. In Phase 38 the loader is registered in .mcp.json/.cursor/mcp.json and external MCP servers are managed by the user.</span>
                <textarea class="field-input" placeholder='{"command":"python","args":[".agent/mcp/server.py"]}' style="width:100%;min-height:60px;font-size:11px;font-family:var(--mono);resize:vertical;padding:5px 8px"
                          onchange="updateTool(${i}, 'server_config', this.value)">${esc(t.server_config)}</textarea>
              </div>
            </details>
          `}
        </div>
      `).join('')}
      <button class="add-btn" onclick="addTool()">+ Add Tool</button>
    </div>
  </div>`;

  // Gate defaults
  const gateOpen = state.ui.openSections.has('gate') ? '' : ' collapsed';
  const g = w.gate;
  html += `<div class="section-card${gateOpen}" id="sec-gate">
    <div class="section-header" onclick="toggleSection('gate')">
      ${chevronSVG}
      <div class="section-title">Gate Defaults</div>
      <div class="gate-chips">
        <span class="gate-chip ${g.structural ? 'gate-chip-on' : 'gate-chip-off'}"><span class="gate-dot"></span>structural</span>
        <span class="gate-chip ${g.semantic ? 'gate-chip-on' : 'gate-chip-off'}"><span class="gate-dot"></span>semantic</span>
        <span class="gate-chip ${g.human ? 'gate-chip-on' : 'gate-chip-off'}"><span class="gate-dot"></span>human</span>
        <span class="gate-chip" style="background:var(--blue-bg);color:var(--blue)">gate: ${g.max_gate_retries}</span>
        <span class="gate-chip" style="background:var(--purple-bg);color:var(--purple)">step: ${g.max_step_retries}</span>
      </div>
    </div>
    <div class="section-body">
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
        <span class="step-chip ${g.structural ? 'step-chip-on' : 'step-chip-off'}" onclick="updateGate('structural', !state.workflow.gate.structural)" style="cursor:pointer"><span class="step-chip-dot"></span><span class="step-chip-key">structural</span></span>${helpBtn('gate.structural')}
        <span class="step-chip ${g.semantic ? 'step-chip-on' : 'step-chip-off'}" onclick="updateGate('semantic', !state.workflow.gate.semantic)" style="cursor:pointer"><span class="step-chip-dot"></span><span class="step-chip-key">semantic</span></span>${helpBtn('gate.semantic')}
        <span class="step-chip ${g.human ? 'step-chip-on' : 'step-chip-off'}" onclick="updateGate('human', !state.workflow.gate.human)" style="cursor:pointer"><span class="step-chip-dot"></span><span class="step-chip-key">human</span></span>${helpBtn('gate.human')}
        <span style="width:1px;height:18px;background:var(--border);margin:0 4px"></span>
        <span style="font-size:11px;color:var(--text-muted)">step retries:</span>${helpBtn('gate.max_step_retries')}
        <input type="number" class="field-input field-input-num" value="${g.max_step_retries}" min="0" max="10" style="width:50px;padding:3px 6px;font-size:11px"
               onchange="updateGate('max_step_retries', parseInt(this.value) || 3)">
        <span style="font-size:11px;color:var(--text-muted)">gate retries:</span>${helpBtn('gate.max_gate_retries')}
        <input type="number" class="field-input field-input-num" value="${g.max_gate_retries}" min="0" max="25" style="width:50px;padding:3px 6px;font-size:11px"
               onchange="updateGate('max_gate_retries', parseInt(this.value) || 5)">
      </div>
    </div>
  </div>`;

  // Steps
  html += `<div class="flex-between" style="margin-bottom:12px">
    <div class="section-title" style="font-size:13px">STEPS</div>
    <button class="add-btn" onclick="addStep()">+ Add Step</button>
  </div>`;

  if (w.steps.length === 0) {
    html += `<div class="empty-state">No steps yet. Click "Add Step" to create your first step.</div>`;
  }

  w.steps.forEach((s, i) => {
    const open = state.ui.openSteps.has(i);
    html += renderStepCard(s, i, open);
  });

  document.getElementById('workflowTab').innerHTML = html;
  updateStructCount();
  if (state.ui.yamlPreview) renderPreview();
}

function renderStepCard(s, i, open) {
  const collapsed = open ? '' : ' collapsed';
  const nameDisplay = s.name || 'Untitled step';
  const nameClass = s.name ? '' : ' empty';
  const chips = [];
  if (s.inputs.length) chips.push(`<span class="chip chip-blue">${s.inputs.length} input${s.inputs.length > 1 ? 's' : ''}</span>`);
  if (s.outputs.length) chips.push(`<span class="chip chip-purple">${s.outputs.length} output${s.outputs.length > 1 ? 's' : ''}</span>`);
  if (s.carry_forward != null) chips.push(`<span class="chip chip-blue">carry_forward: ${s.carry_forward ? 'on' : 'off'}</span>`);
  if (s.parallel) chips.push(`<span class="chip chip-amber">parallel</span>`);
  if (s.delegate_to) chips.push(`<span class="chip chip-green">delegate</span>`);
  if (s.gate) chips.push(`<span class="chip chip-amber">gate override</span>`);
  if (Object.keys(s.param_bindings || {}).length) chips.push(`<span class="chip chip-purple">bindings</span>`);

  let html = `<div class="step-card${collapsed}">
    <div class="step-header" onclick="toggleStep(${i})">
      ${stepChevronSVG}
      <span class="step-num">${i + 1}</span>
      <span class="step-name${nameClass}">${esc(nameDisplay)}</span>
      <span class="step-chips">${chips.join('')}</span>
      <span class="step-actions" onclick="event.stopPropagation()">
        <button class="btn-icon" onclick="moveStep(${i},-1)" title="Move up" ${i === 0 ? 'disabled style="opacity:0.3"' : ''}>&#x25B2;</button>
        <button class="btn-icon" onclick="moveStep(${i},1)" title="Move down" ${i === state.workflow.steps.length - 1 ? 'disabled style="opacity:0.3"' : ''}>&#x25BC;</button>
        <button class="btn-icon danger" onclick="removeStep(${i})" title="Delete step">&times;</button>
      </span>
    </div>
    <div class="step-details">`;

  // Basic fields
  html += `
    <div class="field-row">
      <div class="field-group">
        <label class="field-label"><span class="required">*</span> Name ${helpBtn('step.name')}</label>
        <input type="text" class="field-input" value="${esc(s.name)}" placeholder="step-name"
               onchange="updateStep(${i}, 'name', this.value)">
      </div>
    </div>
    <div class="field-group">
      <label class="field-label"><span class="required">*</span> Goal ${helpBtn('step.goal')}</label>
      <textarea class="field-textarea goal" placeholder="Detailed instructions for the subagent..."
                onchange="updateStep(${i}, 'goal', this.value)">${esc(s.goal)}</textarea>
    </div>`;

  // Step config chips (trace-viewer style)
  const cfgEffective = {
    spec_check: s.spec_check,
    subagent: s.subagent,
    carry_forward: s.carry_forward,
  };
  const wfGate = state.workflow.gate;
  const stepGate = s.gate || {};
  const hasGateOverride = s.gate && Object.keys(s.gate).length > 0;

  html += `<div style="margin-bottom:12px">
    <div class="field-label" style="margin-bottom:6px">Step Config${hasGateOverride ? ' <span style="font-size:9px;opacity:0.5;font-weight:400">(dashed = step override)</span>' : ''} ${helpBtn('step.subagent')}</div>
    <div class="step-config-chips">`;

  // spec_check chip
  html += `<span class="step-chip ${s.spec_check ? 'step-chip-on' : 'step-chip-off'}" onclick="toggleStepChip(${i},'spec_check')" title="Click to toggle. ${esc(HELP['step.spec_check'])}"><span class="step-chip-dot"></span><span class="step-chip-key">spec_check</span></span>`;

  // subagent chip
  html += `<span class="step-chip ${s.subagent ? 'step-chip-on' : 'step-chip-off'}" onclick="toggleStepChip(${i},'subagent')" title="Click to toggle. ${esc(HELP['step.subagent'])}"><span class="step-chip-dot"></span><span class="step-chip-key">subagent</span></span>`;

  // carry_forward chip (tri-state: null=inherit, true, false)
  const cfLabel = s.carry_forward === true ? 'ON' : s.carry_forward === false ? 'OFF' : 'inherit';
  const cfClass = s.carry_forward === true ? 'step-chip-on' : s.carry_forward === false ? 'step-chip-off' : 'step-chip-off';
  const cfStyle = s.carry_forward == null ? ' style="border-style:dashed"' : '';
  html += `<span class="step-chip ${cfClass}"${cfStyle} onclick="cycleCarryForward(${i})" title="Click to cycle (inherit → ON → OFF). ${esc(HELP['step.carry_forward'])}"><span class="step-chip-dot"></span><span class="step-chip-key">carry_forward: ${cfLabel}</span></span>`;

  // Gate chips — show effective config
  ['structural', 'semantic', 'human'].forEach(name => {
    const isOverride = stepGate[name] != null;
    const effective = isOverride ? stepGate[name] : (wfGate[name] ?? false);
    const overrideClass = isOverride ? ' step-chip-override' : '';
    html += `<span class="step-chip ${effective ? 'step-chip-on' : 'step-chip-off'}${overrideClass}" onclick="toggleGateChip(${i},'${name}')" title="Click to toggle override. gate.${name}${isOverride ? ' (step override)' : ' (from workflow)'}"><span class="step-chip-dot"></span><span class="step-chip-key">gate.${name}</span></span>`;
  });

  // Parallel and Delegation quick-enable chips (only when off)
  if (!s.parallel) {
    html += `<span class="step-chip step-chip-off" onclick="updateStep(${i},'parallel',true)" title="Click to enable parallel fan-out" style="border-style:dashed;cursor:pointer"><span class="step-chip-dot"></span><span class="step-chip-key">+ parallel</span></span>`;
  }
  if (!s.delegate_to) {
    html += `<span class="step-chip step-chip-off" onclick="promptDelegation(${i})" title="Click to set delegation target" style="border-style:dashed;cursor:pointer"><span class="step-chip-dot"></span><span class="step-chip-key">+ delegate</span></span>`;
  }

  // (model field rendered separately below chips)

  html += `</div>`;

  // Model preference — only for subagent steps (inline steps use orchestrator's model)
  if (s.subagent) html += `<div style="display:flex;align-items:center;gap:8px;margin-top:8px">
    <span class="field-label" style="margin:0;font-size:11px;min-width:130px">Preferred model ${helpBtn('step.model')}</span>
    <select class="field-select" style="width:200px;padding:3px 8px;font-size:12px;font-family:var(--mono)"
      onchange="updateStep(${i},'model',this.value)"
      title="${esc(HELP['step.model'])}">
      <option value=""${!s.model ? ' selected' : ''}>(inherit from orchestrator)</option>
      <optgroup label="Claude — current">
        <option value="claude-opus-4-6"${s.model === 'claude-opus-4-6' ? ' selected' : ''}>claude-opus-4-6</option>
        <option value="claude-sonnet-4-6"${s.model === 'claude-sonnet-4-6' ? ' selected' : ''}>claude-sonnet-4-6</option>
        <option value="claude-haiku-4-5-20251001"${s.model === 'claude-haiku-4-5-20251001' ? ' selected' : ''}>claude-haiku-4-5</option>
      </optgroup>
      <optgroup label="Claude — shorthand">
        <option value="opus"${s.model === 'opus' ? ' selected' : ''}>opus</option>
        <option value="sonnet"${s.model === 'sonnet' ? ' selected' : ''}>sonnet</option>
        <option value="haiku"${s.model === 'haiku' ? ' selected' : ''}>haiku</option>
      </optgroup>
      <optgroup label="Claude — legacy">
        <option value="claude-sonnet-4-5-20250929"${s.model === 'claude-sonnet-4-5-20250929' ? ' selected' : ''}>claude-sonnet-4-5</option>
        <option value="claude-sonnet-4-20250514"${s.model === 'claude-sonnet-4-20250514' ? ' selected' : ''}>claude-sonnet-4</option>
        <option value="claude-opus-4-20250514"${s.model === 'claude-opus-4-20250514' ? ' selected' : ''}>claude-opus-4</option>
      </optgroup>
    </select>
    <input type="text" class="field-input" value="${esc(s.model && !['haiku','sonnet','opus','claude-opus-4-6','claude-sonnet-4-6','claude-haiku-4-5-20251001','claude-sonnet-4-5-20250929','claude-sonnet-4-20250514','claude-opus-4-20250514'].includes(s.model) ? s.model : '')}"
      placeholder="or type custom model ID"
      style="flex:1;padding:3px 8px;font-size:12px;font-family:var(--mono);min-width:160px"
      onchange="if(this.value.trim()){updateStep(${i},'model',this.value.trim());this.previousElementSibling.value='';}"
      title="Custom model ID (e.g., gpt-4o, gemini-2.0-flash). Overrides the dropdown.">
  </div>`;  // end model preference

  // Step tools — only show if workflow has tools defined
  if (state.workflow.tools.length > 0) {
    html += `<div style="display:flex;align-items:center;gap:8px;margin-top:8px">
      <span class="field-label" style="margin:0;font-size:11px;min-width:130px">Step tools ${helpBtn('step.tools')}</span>
      <input type="text" class="field-input" value="${esc(s.tools || '')}"
        placeholder="Comma-separated tool names, or empty for all"
        style="flex:1;padding:3px 8px;font-size:12px;font-family:var(--mono);min-width:160px"
        onchange="updateStep(${i},'tools',this.value)"
        title="Restrict which workflow-level tools this step can use. Leave empty to allow all tools.">
    </div>`;
  }

  // Gate retry overrides + Clear — inline right after chips
  if (hasGateOverride) {
    html += `<div style="display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap">
      <span style="font-size:11px;color:var(--text-muted)">step retries:</span>
      <input type="number" class="field-input field-input-num" value="${s.gate.max_step_retries != null ? s.gate.max_step_retries : ''}" min="0" max="10" placeholder="—" style="width:50px;padding:3px 6px;font-size:11px"
             onchange="updateStepGate(${i}, 'max_step_retries', this.value ? parseInt(this.value) : null)" title="Max step retries (new subagent spawns)">
      <span style="font-size:11px;color:var(--text-muted)">gate retries:</span>
      <input type="number" class="field-input field-input-num" value="${s.gate.max_gate_retries != null ? s.gate.max_gate_retries : ''}" min="0" max="25" placeholder="—" style="width:50px;padding:3px 6px;font-size:11px"
             onchange="updateStepGate(${i}, 'max_gate_retries', this.value ? parseInt(this.value) : null)" title="Max gate retries (in-place self-correction)">
      <button class="btn btn-sm btn-danger" onclick="clearStepGate(${i})" style="font-size:10px;padding:2px 8px;margin-left:auto" title="Remove all gate overrides">Clear overrides</button>
    </div>`;
  }

  html += `</div>`;

  // Parallel (compact — inline when off)
  if (s.parallel) {
    html += `<div class="subsection">
      <div class="flex-between">
        <div class="subsection-title mb-0">Parallel ${helpBtn('step.parallel')}</div>
        <button class="btn btn-sm" onclick="updateStep(${i}, 'parallel', false)" style="font-size:11px;padding:2px 8px">Disable</button>
      </div>
      <div class="field-group mt-8">
        <label class="field-label"><span class="required">*</span> Parallel key ${helpBtn('step.parallel_key')}</label>
        <input type="text" class="field-input" value="${esc(s.parallel_key)}" placeholder='manifest.tasks[status=pending]' style="font-size:12px;padding:5px 8px"
               onchange="updateStep(${i}, 'parallel_key', this.value)">
      </div>
    </div>`;
  }

  // Delegation (compact — inline when off)
  if (s.delegate_to) {
    html += `<div class="subsection">
      <div class="subsection-title">Delegation ${helpBtn('step.delegate_to')}</div>
      <div class="field-group">
        <input type="text" class="field-input" value="${esc(s.delegate_to)}" placeholder="workflow-name" style="font-size:12px;padding:5px 8px"
               onchange="updateStep(${i}, 'delegate_to', this.value)">
      </div>
      <div class="subsection-title mt-8">Params ${helpBtn('step.delegate_params')}</div>
      ${Object.entries(s.delegate_params || {}).map(([k, v], pi) => `
        <div class="field-row" style="margin-bottom:4px">
          <input type="text" class="field-input" value="${esc(k)}" placeholder="key" style="max-width:120px;font-size:12px;padding:4px 8px"
                 onchange="renameDelegateParam(${i}, '${esc(k)}', this.value)">
          <input type="text" class="field-input" value="${esc(v)}" placeholder="value or {param}" style="font-size:12px;padding:4px 8px"
                 onchange="updateDelegateParam(${i}, '${esc(k)}', this.value)">
          <button class="list-remove" onclick="removeDelegateParam(${i}, '${esc(k)}')">&times;</button>
        </div>
      `).join('')}
      <button class="add-btn" onclick="addDelegateParam(${i})">+ Add Param</button>
    </div>`;
  }

  // Inputs (compact single-row)
  html += `<div class="subsection">
    <div class="flex-between">
      <div class="subsection-title mb-0">Inputs ${helpBtn('input.path')}</div>
      <button class="add-btn" onclick="addInput(${i})">+ Add</button>
    </div>
    ${s.inputs.map((inp, j) => `
      <div class="list-item mt-8" style="padding:5px 8px;gap:6px;align-items:center">
        <input type="text" class="field-input" value="${esc(inp.path)}" placeholder=".agent/specs/**/*.md" style="flex:1;min-width:0;padding:5px 8px;font-size:12px"
               onchange="updateInput(${i}, ${j}, 'path', this.value)">
        <select class="field-select" onchange="updateInput(${i}, ${j}, 'inject', this.value)" style="max-width:120px;padding:5px 26px 5px 8px;font-size:11px" title="Inject mode">
          <option value="file"${inp.inject === 'file' ? ' selected' : ''}>file</option>
          <option value="file_if_exists"${inp.inject === 'file_if_exists' ? ' selected' : ''}>if_exists</option>
          <option value="reference"${inp.inject === 'reference' ? ' selected' : ''}>reference</option>
        </select>
        ${structDropdown(inp.struct, `handleStructSelect(this, ${i}, ${j}, 'input')`).replace('style="max-width:180px"', 'style="max-width:130px;padding:5px 26px 5px 8px;font-size:11px" title="Struct schema"')}
        <button class="list-remove" onclick="removeInput(${i}, ${j})" style="margin:0">&times;</button>
      </div>
    `).join('')}
    ${s.inputs.length === 0 ? '<div class="field-hint mt-8">No inputs defined.</div>' : ''}
  </div>`;

  // Outputs (compact single-row)
  html += `<div class="subsection">
    <div class="flex-between">
      <div class="subsection-title mb-0">Outputs ${helpBtn('output.path')}</div>
      <button class="add-btn" onclick="addOutput(${i})">+ Add</button>
    </div>
    ${s.outputs.map((out, j) => `
      <div class="list-item mt-8" style="padding:5px 8px;gap:6px;align-items:center">
        <input type="text" class="field-input" value="${esc(out.path)}" placeholder=".agent/workflows/my-wf/data/output.json" style="flex:1;min-width:0;padding:5px 8px;font-size:12px"
               onchange="updateOutput(${i}, ${j}, 'path', this.value)">
        ${structDropdown(out.struct, `handleStructSelect(this, ${i}, ${j}, 'output')`).replace('style="max-width:180px"', 'style="max-width:130px;padding:5px 26px 5px 8px;font-size:11px" title="Struct schema"')}
        <button class="list-remove" onclick="removeOutput(${i}, ${j})" style="margin:0">&times;</button>
      </div>
    `).join('')}
    ${s.outputs.length === 0 ? '<div class="field-hint mt-8">No outputs defined. Steps without outputs skip structural gate validation.</div>' : ''}
  </div>`;

  // Param bindings
  const pbKeys = Object.keys(s.param_bindings || {});
  if (pbKeys.length > 0 || s.outputs.length > 0) {
    html += `<div class="subsection">
      <div class="flex-between">
        <div class="subsection-title mb-0">Param Bindings ${helpBtn('step.param_bindings')}</div>
        <button class="add-btn" onclick="addParamBinding(${i})">+ Add</button>
      </div>
      <div class="field-hint" style="margin:6px 0 8px">Update workflow params from step outputs after gate passes. Syntax: <code style="background:var(--bg-hover);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:11px">data/output.json::field</code></div>
      ${pbKeys.map(k => `
        <div class="field-row" style="margin-bottom:6px">
          <input type="text" class="field-input" value="${esc(k)}" placeholder="param_name" style="max-width:140px"
                 onchange="renameParamBinding(${i}, '${esc(k)}', this.value)">
          <input type="text" class="field-input" value="${esc(s.param_bindings[k])}" placeholder="data/output.json::field"
                 onchange="updateParamBinding(${i}, '${esc(k)}', this.value)">
          <button class="list-remove" onclick="removeParamBinding(${i}, '${esc(k)}')">&times;</button>
        </div>
      `).join('')}
      ${pbKeys.length === 0 ? '<div class="field-hint mt-8">No bindings defined. Add one to pipe step outputs into workflow params.</div>' : ''}
    </div>`;
  }

  html += `</div></div>`;
  return html;
}

// ── Render: Structs Tab ────────────────────────────────
function renderStructsTab() {
  let html = `<div class="flex-between" style="margin-bottom:12px">
    <div class="section-title" style="font-size:13px">STRUCT SCHEMAS</div>
    <button class="add-btn" onclick="addStruct()">+ Add Schema</button>
  </div>`;

  if (state.structs.length === 0) {
    html += `<div class="empty-state">No struct schemas yet. Click "Add Schema" to create one.<br><small>Struct schemas validate step inputs and outputs.</small></div>`;
  }

  state.structs.forEach((s, i) => {
    const open = state.ui.openStructs.has(i);
    html += renderStructCard(s, i, open);
  });

  document.getElementById('structsTab').innerHTML = html;
  updateStructCount();
}

function renderStructCard(s, i, open) {
  const collapsed = open ? '' : ' collapsed';
  const nameDisplay = s.name || 'Untitled schema';
  const nameClass = s.name ? '' : ' empty';
  const formatBadge = s.format ? `<span class="chip chip-purple">${s.format}</span>` : '';

  let html = `<div class="struct-card${collapsed}">
    <div class="struct-header" onclick="toggleStruct(${i})">
      ${chevronSVG}
      <span class="struct-icon">S</span>
      <span class="struct-name${nameClass}">${esc(nameDisplay)}</span>
      ${formatBadge}
      <span class="step-actions" onclick="event.stopPropagation()">
        <button class="btn-icon danger" onclick="removeStruct(${i})" title="Delete schema">&times;</button>
      </span>
    </div>
    <div class="struct-details">`;

  // Basic fields
  html += `
    <div class="field-group">
      <label class="field-label"><span class="required">*</span> Name ${helpBtn('struct.name')}</label>
      <input type="text" class="field-input" value="${esc(s.name)}" placeholder="my-schema"
             onchange="updateStruct(${i}, 'name', this.value)">
    </div>
    <div class="field-group">
      <label class="field-label"><span class="required">*</span> Description ${helpBtn('struct.description')}</label>
      <input type="text" class="field-input" value="${esc(s.description)}" placeholder="What this schema validates"
             onchange="updateStruct(${i}, 'description', this.value)">
    </div>
    <div class="field-group">
      <label class="field-label"><span class="required">*</span> Format ${helpBtn('struct.format')}</label>
      <select class="field-select" style="max-width:180px" onchange="updateStruct(${i}, 'format', this.value)">
        <option value="json"${s.format === 'json' ? ' selected' : ''}>json</option>
        <option value="yaml"${s.format === 'yaml' ? ' selected' : ''}>yaml</option>
        <option value="markdown"${s.format === 'markdown' ? ' selected' : ''}>markdown</option>
        <option value="text"${s.format === 'text' ? ' selected' : ''}>text</option>

    </div>`;

    html += `<div class="subsection">

  return html;
}

// ── Render: YAML Preview ───────────────────────────────
function renderPreview() {
  const yaml = generateWorkflowYAML(state.workflow);
  // Basic syntax coloring
  const colored = yaml.split('\n').map(line => {
    // Comment
    if (line.trim().startsWith('#')) return `<span class="yc">${esc(line)}</span>`;
    // Key: value
    const m = line.match(/^(\s*(?:- )?)(\w[\w.-]*)(:\s*)(.*)/);
    if (m) {
      return esc(m[1]) + `<span class="yk">${esc(m[2])}</span>` + esc(m[3]) + (m[4] ? `<span class="yv">${esc(m[4])}</span>` : '');
    }
    // List item without key
    const lm = line.match(/^(\s*- )(.*)/);
    if (lm) return esc(lm[1]) + `<span class="yv">${esc(lm[2])}</span>`;
    return esc(line);
  }).join('\n');
  document.getElementById('previewBody').innerHTML = colored;
}

let previewTimer = null;
function schedulePreview() {
  if (!state.ui.yamlPreview) return;
  clearTimeout(previewTimer);
  previewTimer = setTimeout(renderPreview, 200);
}

function addStep() {
  const idx = state.workflow.steps.length;
  state.workflow.steps.push({
    name: '', goal: '', subagent: true, spec_check: true,
    model: '',
    tools: '',
    carry_forward: null,

    inputs: [], outputs: [], gate: null

  state.ui.openSteps.add(idx);
  markDirty();
  renderWorkflowTab();

function removeStep(i) {
  if (!confirm(`Delete step "${state.workflow.steps[i].name || 'Untitled'}"?`)) return;
  state.workflow.steps.splice(i, 1);
  // Fix open steps indices
  const newOpen = new Set();
  state.ui.openSteps.forEach(idx => {
    if (idx < i) newOpen.add(idx);
    else if (idx > i) newOpen.add(idx - 1);
  });
  state.ui.openSteps = newOpen;
  markDirty();
  renderWorkflowTab();
}
function moveStep(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= state.workflow.steps.length) return;
  const steps = state.workflow.steps;
  [steps[i], steps[j]] = [steps[j], steps[i]];
  // Fix open indices
  const newOpen = new Set();
  state.ui.openSteps.forEach(idx => {
    if (idx === i) newOpen.add(j);
    else if (idx === j) newOpen.add(i);
    else newOpen.add(idx);
  });
  state.ui.openSteps = newOpen;
  markDirty();
  renderWorkflowTab();
}
function updateStep(i, field, value) {
  state.workflow.steps[i][field] = value;
  markDirty();
  renderWorkflowTab();
}

// Step chip toggles (trace-viewer style)
function toggleStepChip(i, field) {
  state.workflow.steps[i][field] = !state.workflow.steps[i][field];
  markDirty();
  renderWorkflowTab();
}

function cycleCarryForward(i) {
  const cur = state.workflow.steps[i].carry_forward;
  // null → true → false → null
  if (cur == null) state.workflow.steps[i].carry_forward = true;
  else if (cur === true) state.workflow.steps[i].carry_forward = false;
  else state.workflow.steps[i].carry_forward = null;
  markDirty();
  renderWorkflowTab();
}

function toggleGateChip(i, field) {
  const s = state.workflow.steps[i];
  if (!s.gate) s.gate = {};
  const wfVal = state.workflow.gate[field] ?? false;
  if (s.gate[field] != null) {
    // Has override — toggle the override value, or clear if back to workflow default
    const newVal = !s.gate[field];
    if (newVal === wfVal) {
      delete s.gate[field];
      // Clean up empty gate object
      if (Object.keys(s.gate).length === 0) s.gate = null;
    } else {
      s.gate[field] = newVal;
    }
  } else {
    // No override — set override to opposite of workflow default
    s.gate[field] = !wfVal;
  }
  state.workflow.steps[i] = s;
  markDirty();
  renderWorkflowTab();
}

function promptDelegation(i) {
  const name = prompt('Workflow name to delegate to:');
  if (name) {
    state.workflow.steps[i].delegate_to = name;

}

function handleStructSelect(select, stepIdx, itemIdx, type) {
  const val = select.value;
  if (val === '__new__') {
    addStruct();
    select.value = '';
    return;
  }
  if (type === 'input') {
    state.workflow.steps[stepIdx].inputs[itemIdx].struct = val;
  } else {
    state.workflow.steps[stepIdx].outputs[itemIdx].struct = val;
  }
  markDirty();
  schedulePreview();
}

  }

// ── File I/O ───────────────────────────────────────────
function newWorkflow() {
  if (state.ui.dirty && !confirm('Discard unsaved changes?')) return;
  state.workflow = {
    name: '', version: 1, description: '',
    params: [],
    tools: [],
    gate: { structural: true, semantic: false, human: false, max_step_retries: 3, max_gate_retries: 5 },
    context: { carry_forward: 'none' },
    steps: []
  };
  state.structs = [];
  state.ui.openSteps = new Set();
  state.ui.openStructs = new Set();
  state.ui.dirty = false;
  switchTab('workflow');
  renderWorkflowTab();
  renderStructsTab();
}

function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = parseYAML(e.target.result);
      loadWorkflowFromParsed(parsed);
      autoDetectStructs();
      state.ui.openSteps = new Set();
      state.ui.openStructs = new Set();
      state.ui.dirty = false;
      renderWorkflowTab();
      renderStructsTab();
    } catch (err) {
      alert('Error parsing YAML: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function handleFileInput(event) {
  const file = event.target.files[0];
  if (file) loadFile(file);
  event.target.value = '';
}

function downloadFile(content, filename) {
  const blob = new Blob([content], { type: 'text/yaml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportYAML() {
  const errors = validateWorkflow();
  if (errors.length > 0) {
    alert('Validation errors:\n\n' + errors.join('\n'));
    return;
  }
  const yaml = generateWorkflowYAML(state.workflow);
  downloadFile(yaml, 'workflow.yaml');
  state.ui.dirty = false;
}

function exportAll() {
  const errors = validateWorkflow();
  if (errors.length > 0) {
    alert('Validation errors:\n\n' + errors.join('\n'));
    return;
  }
  // Download workflow.yaml
  downloadFile(generateWorkflowYAML(state.workflow), 'workflow.yaml');

  // Download struct schemas with delay
  state.structs.forEach((s, i) => {
    if (!s.name) return;
    setTimeout(() => {
      downloadFile(generateStructYAML(s), s.name + '.schema.yaml');
    }, (i + 1) * 300);
  });

  state.ui.dirty = false;
}

function copyYAML() {
  const yaml = generateWorkflowYAML(state.workflow);
  navigator.clipboard.writeText(yaml).then(() => {
    const btn = document.querySelector('.header-actions .btn-sm:nth-child(3)');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = yaml;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

// ── Keyboard shortcuts ─────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    exportYAML();
  }
});

// ── Unsaved changes warning ────────────────────────────
window.addEventListener('beforeunload', e => {
  if (state.ui.dirty) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ── Init ───────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderWorkflowTab();
  renderStructsTab();
});
</script>
</body>
</html>
